// ── Hook useIsMobile ────────────────────────────────────────────────────────
function useIsMobile() {
  const [mob, setMob] = useState(window.innerWidth <= 700);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth <= 700);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

// ── localStorage hook ──────────────────────────────────────────────────────
function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }, [key, value]);
  return [value, setValue];
}

// ── Supabase data hooks ─────────────────────────────────────────────────────
function useSupaChantiers(userId) {
  const [chantiers, setChantiers] = useState(null);

  const load = useCallback(async () => {
    if (!userId) return;
    const { data } = await supabase.from("chantiers").select("*").eq("user_id", userId).order("created_at", { ascending: false });
    setChantiers(data || []);
  }, [userId]);

  useEffect(() => { load(); }, [load]);

  const saveNew = async (c) => {
    const { nom, client, commune, statut, phase, notes, checks, rappels } = c;
    const { data } = await supabase.from("chantiers").insert({ nom, client, commune, statut, phase, notes, checks, rappels, user_id: userId }).select().single();
    setChantiers(prev => [data, ...(prev||[])]);
    return data;
  };

  const update = async (updated) => {
    const { nom, client, commune, statut, phase, notes, checks, rappels } = updated;
    await supabase.from("chantiers").update({ nom, client, commune, statut, phase, notes, checks, rappels, updated_at: new Date().toISOString() }).eq("id", updated.id);
    setChantiers(prev => (prev||[]).map(c => c.id === updated.id ? updated : c));
  };

  const del = async (id) => {
    await supabase.from("chantiers").delete().eq("id", id);
    setChantiers(prev => (prev||[]).filter(c => c.id !== id));
  };

  return { chantiers, setChantiers, load, saveNew, update, del };
}

function useSupaSettings(userId) {
  const [settings, setSettings] = useState(null);

  useEffect(() => {
    if (!userId) return;
    (async () => {
      const { data } = await supabase.from("user_settings").select("*").eq("user_id", userId).maybeSingle();
      setSettings(data || { phases: null, modeles_checklist: {} });
    })();
  }, [userId]);

  const saveSettings = async (newSettings) => {
    setSettings(s => ({ ...s, ...newSettings }));
    const { data: existing } = await supabase.from("user_settings").select("id").eq("user_id", userId).maybeSingle();
    const payload = { ...newSettings, user_id: userId, updated_at: new Date().toISOString() };
    if (existing) {
      await supabase.from("user_settings").update(payload).eq("user_id", userId);
    } else {
      await supabase.from("user_settings").insert(payload);
    }
  };

  return { settings, saveSettings };
}

// ── Panneau complet : gestion des étapes + checklists ────────────────────
function ModelesPanel({ phases, modeles, onSavePhases, onSaveModele, onClose }) {
  const [localPhases, setLocalPhases] = useState(phases.map(p => ({ ...p })));
  const [localModeles, setLocalModeles] = useState({ ...modeles });
  const [editPhaseIdx, setEditPhaseIdx] = useState(null); // index de la phase dont on édite la checklist
  const [renamingIdx, setRenamingIdx] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const [newPhaseLabel, setNewPhaseLabel] = useState("");
  const [newPhasePct, setNewPhasePct] = useState("");
  const [newCheckItem, setNewCheckItem] = useState("");

  // ── gestion des étapes ──
  const movePhase = (i, dir) => {
    const arr = [...localPhases];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setLocalPhases(arr);
  };

  const deletePhase = (i) => {
    if (localPhases.length <= 1) return;
    if (editPhaseIdx === i) setEditPhaseIdx(null);
    setLocalPhases(arr => arr.filter((_, idx) => idx !== i));
  };

  const startRename = (i) => { setRenamingIdx(i); setRenameVal(localPhases[i].label); };
  const saveRename = () => {
    if (!renameVal.trim()) return;
    const oldLabel = localPhases[renamingIdx].label;
    const newLabel = renameVal.trim();
    // migrer checklist si le label change
    if (oldLabel !== newLabel && localModeles[oldLabel]) {
      const m = { ...localModeles };
      m[newLabel] = m[oldLabel];
      delete m[oldLabel];
      setLocalModeles(m);
    }
    setLocalPhases(arr => arr.map((p, i) => i === renamingIdx ? { ...p, label: newLabel } : p));
    setRenamingIdx(null);
  };

  const addPhase = () => {
    const label = newPhaseLabel.trim();
    const pct = Math.min(100, Math.max(0, parseInt(newPhasePct) || 0));
    if (!label) return;
    if (localPhases.find(p => p.label === label)) return;
    setLocalPhases(arr => [...arr, { label, pct }]);
    setNewPhaseLabel(""); setNewPhasePct("");
  };

  const updatePct = (i, val) => {
    const pct = Math.min(100, Math.max(0, parseInt(val) || 0));
    setLocalPhases(arr => arr.map((p, idx) => idx === i ? { ...p, pct } : p));
  };

  // ── gestion checklist de la phase sélectionnée ──
  const editPhase = editPhaseIdx !== null ? localPhases[editPhaseIdx] : null;
  const checkItems = editPhase ? (localModeles[editPhase.label] || CHECKLIST_BASE[editPhase.label] || []) : [];

  const addCheckItem = () => {
    if (!newCheckItem.trim() || !editPhase) return;
    setLocalModeles(m => ({ ...m, [editPhase.label]: [...checkItems, newCheckItem.trim()] }));
    setNewCheckItem("");
  };

  const removeCheckItem = (item) => {
    setLocalModeles(m => ({ ...m, [editPhase.label]: checkItems.filter(i => i !== item) }));
  };

  const moveCheckItem = (i, dir) => {
    const arr = [...checkItems];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setLocalModeles(m => ({ ...m, [editPhase.label]: arr }));
  };

  const [editCheckIdx, setEditCheckIdx] = useState(null);
  const [editCheckVal, setEditCheckVal] = useState("");
  const startEditCheck = (i) => { setEditCheckIdx(i); setEditCheckVal(checkItems[i]); };
  const saveEditCheck = () => {
    if (!editCheckVal.trim() || !editPhase) return;
    const arr = checkItems.map((x, i) => i === editCheckIdx ? editCheckVal.trim() : x);
    setLocalModeles(m => ({ ...m, [editPhase.label]: arr }));
    setEditCheckIdx(null);
  };

  const resetChecklist = () => {
    if (!editPhase) return;
    setLocalModeles(m => { const n = { ...m }; delete n[editPhase.label]; return n; });
  };

  // ── sauvegarder tout ──
  const saveAll = () => {
    onSavePhases(localPhases);
    Object.entries(localModeles).forEach(([phase, items]) => onSaveModele(phase, items));
    onClose();
  };

  const btnStyle = (active) => ({
    background: active ? "#1a1a1a" : "#fff", color: active ? "#fff" : C.muted,
    border: `1.5px solid ${active ? "#1a1a1a" : C.border}`, borderRadius:8,
    padding:"6px 14px", fontSize:12, fontWeight: active ? 600 : 400,
    cursor:"pointer", fontFamily:"inherit",
  });

  return (

            <div style={{ padding:"10px 12px", borderTop:`1px solid ${C.border}`, flexShrink:0, display:"flex", flexDirection:"column", gap:6 }}>

          </div>
        </div>
      </div>
    </div>
  );
}

// ── ChecklistPanel (chantier spécifique) ──────────────────────────────────
function ChecklistPanel({ chantier, onUpdate, modeles }) {
  const phase = chantier.phase;
  // items de base = modèle personnalisé si dispo, sinon base par défaut
  const baseItems = modeles[phase] || CHECKLIST_BASE[phase] || [];
  const checks = chantier.checks || {};
  const phaseChecks = checks[phase] || {};
  const customItems = phaseChecks._custom || [];
  const allItems = [...baseItems, ...customItems];
  const [newItem, setNewItem] = useState("");
  const [editItem, setEditItem] = useState(null); // index en cours d'édition
  const [editVal, setEditVal] = useState("");

  const toggle = (item) => {
    const updated = { ...checks, [phase]: { ...phaseChecks, [item]: !phaseChecks[item] } };
    onUpdate({ ...chantier, checks: updated });
  };

  const addCustom = () => {
    if (!newItem.trim()) return;
    const custom = [...customItems, newItem.trim()];
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
    setNewItem("");
  };

  const removeCustom = (item) => {
    const custom = customItems.filter(i => i !== item);
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
  };

  const startEditCustom = (item, idx) => { setEditItem(idx); setEditVal(item); };
  const saveEditCustom = (oldItem) => {
    if (!editVal.trim()) return;
    const custom = customItems.map(i => i === oldItem ? editVal.trim() : i);
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
    setEditItem(null);
  };

  const done = allItems.filter(i => phaseChecks[i]).length;
  const total = allItems.length;
  const allDone = done === total && total > 0;
  const hasAlert = done < total;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase" }}>Checklist — {phase}</span>
          {hasAlert && <span style={{ background:"#fef3c7", color:"#92400e", border:"1px solid #fde68a", borderRadius:99, padding:"2px 8px", fontSize:10, fontWeight:700 }}>⚠️ {total-done} en attente</span>}
          {allDone && <span style={{ background:"#d1fae5", color:"#065f46", border:"1px solid #6ee7b7", borderRadius:99, padding:"2px 8px", fontSize:10, fontWeight:700 }}>✅ Tout validé</span>}
        </div>
        <span style={{ color:C.muted, fontSize:12 }}>{done}/{total}</span>
      </div>

      <div style={{ background:"#eeede9", borderRadius:99, height:4, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${total>0?(done/total*100):0}%`, background: allDone?"#22c55e":"#1a1a1a", borderRadius:99, transition:"width .4s" }} />
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
        {allItems.map((item, i) => {
          const checked = !!phaseChecks[item];
          const isCustom = customItems.includes(item);
          const customIdx = customItems.indexOf(item);
          return (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", background: checked?"#f0fdf4":"#fafaf8", borderRadius:8, border:`1px solid ${checked?"#bbf7d0":C.border}` }}>
              {/* checkbox */}
              <div onClick={() => toggle(item)} style={{ width:18, height:18, borderRadius:5, border:`2px solid ${checked?"#22c55e":C.border}`, background: checked?"#22c55e":"#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", transition:"all .15s" }}>
                {checked && <span style={{ color:"#fff", fontSize:11, fontWeight:900 }}>✓</span>}
              </div>

              {/* label ou input d'édition */}
              {isCustom && editItem === customIdx ? (
                <>
                  <input value={editVal} onChange={e => setEditVal(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && saveEditCustom(item)}
                    autoFocus
                    style={{ flex:1, background:"#fff", border:`1.5px solid #1a1a1a`, borderRadius:6, color:"#1a1a1a", padding:"3px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
                  <button onClick={() => saveEditCustom(item)} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>OK</button>
                  <button onClick={() => setEditItem(null)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✕</button>
                </>
              ) : (
                <>
                  <span onClick={() => toggle(item)} style={{ fontSize:13, color: checked?C.muted:"#1a1a1a", textDecoration: checked?"line-through":"none", flex:1, cursor:"pointer" }}>{item}</span>
                  {isCustom && (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={() => startEditCustom(item, customIdx)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:5, padding:"2px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✏️</button>
                      <button onClick={() => removeCustom(item)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:15, padding:0 }}>×</button>
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:6 }}>
        <input value={newItem} onChange={e => setNewItem(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addCustom()}
          placeholder="Ajouter un point pour ce chantier..."
          style={{ flex:1, background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"7px 11px", fontSize:12, fontFamily:"inherit", outline:"none" }}
          onFocus={e => e.target.style.borderColor="#1a1a1a"}
          onBlur={e => e.target.style.borderColor=C.border}
        />
        <button onClick={addCustom} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+</button>
      </div>
      <div style={{ color:C.muted, fontSize:11 }}>
        ℹ️ Les points en italique sont spécifiques à ce chantier. Pour modifier les points communs à tous les chantiers, utilise "Modèles de checklist".
      </div>
    </div>
  );
}

function TabChantiers({ userId, supaChantiers, supaSettings }) {
  const mob = useIsMobile();
  const { chantiers, saveNew, update: updateChantier, del: delChantier } = supaChantiers;
  const { settings, saveSettings } = supaSettings;

  const phases  = settings?.phases?.length > 0 ? settings.phases : PHASES_DEFAULT;
  const modeles = settings?.modeles_checklist || {};

  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState(null);
  const [draft, setDraft] = useState({});
  const [detailTab, setDetailTab] = useState("infos");
  const [showModeles, setShowModeles] = useState(false);
  const [saving, setSaving] = useState(false);

  const phaseInfo = (label) => phases.find(p => p.label === label) || { pct: 0 };

  const openNew = () => {
    setDraft({ nom:"", client:"", commune:"Nîmes", statut:"En attente", phase: phases[0]?.label || "Préparation", notes:"", checks:{}, rappels:[] });
    setForm("new"); setSelected(null);
  };
  const openEdit = (c) => { setDraft({ ...c }); setForm(c.id); setSelected(c.id); };

  const save = async () => {
    if (!draft.nom || saving) return;
    setSaving(true);
    if (form === "new") {
      const newC = await saveNew({ ...draft, rappels: draft.rappels || [] });
      if (newC) setSelected(newC.id);
    } else {
      await updateChantier({ ...draft });
    }
    setSaving(false);
    setForm(null);
  };

  const del = async (id) => {
    await delChantier(id);
    if (selected === id) setSelected(null);
    setForm(null);
  };

  const onPhaseChange = (phase) => {
    const pct = phaseInfo(phase).pct;
    setDraft(d => ({ ...d, phase, avancement: pct }));
  };

  const saveModele = async (phase, items) => {
    await saveSettings({ phases, modeles_checklist: { ...modeles, [phase]: items } });
  };
  const savePhases = async (newPhases) => {
    await saveSettings({ phases: newPhases, modeles_checklist: modeles });
  };

  if (chantiers === null) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:200, color:C.muted, fontSize:14 }}>
      Chargement de vos chantiers...
    </div>
  );

  const sel = (chantiers||[]).find(c => c.id === selected);

  const today = new Date().toISOString().split("T")[0];
  const alerts = (chantiers||[]).filter(c => {
    if (c.statut !== "En cours") return false;
    const base = modeles[c.phase] || CHECKLIST_BASE[c.phase] || [];
    const custom = (c.checks?.[c.phase]?._custom) || [];
    const all = [...base, ...custom];
    const done = all.filter(i => c.checks?.[c.phase]?.[i]).length;
    return done < all.length;
  });

  return (
    <>
      {showModeles && <ModelesPanel phases={phases} modeles={modeles} onSavePhases={savePhases} onSaveModele={saveModele} onClose={() => setShowModeles(false)} />}

      <div style={{ display:"grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap:20, height: mob ? "auto" : "100%" }}>

        {/* liste chantiers */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {alerts.length > 0 && (
            <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10, padding:"10px 14px", display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16 }}>⚠️</span>
              <span style={{ fontSize:12, color:"#92400e", fontWeight:500 }}>{alerts.length} chantier{alerts.length>1?"s":""} avec des points en attente</span>
            </div>
          )}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:C.muted, fontSize:12, fontWeight:500, letterSpacing:".04em", textTransform:"uppercase" }}>{(chantiers||[]).length} chantier{(chantiers||[]).length>1?"s":""}</span>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={() => setShowModeles(true)} style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, padding:"5px 12px", fontSize:11, color:C.muted, cursor:"pointer", fontFamily:"inherit", fontWeight:500 }}>📋 Modèles</button>
              <Btn small onClick={openNew}>+ Nouveau</Btn>
            </div>
          </div>
          <div style={{ overflowY:"auto", display:"flex", flexDirection:"column", gap:8 }}>
            {(chantiers||[]).map(c => {
              const base = modeles[c.phase] || CHECKLIST_BASE[c.phase] || [];
              const custom = (c.checks?.[c.phase]?._custom) || [];
              const all = [...base, ...custom];
              const done = all.filter(i => c.checks?.[c.phase]?.[i]).length;
              const hasAlert = done < all.length && c.statut === "En cours";
            const rappelsEnAttente = (c.rappels||[]).filter(r=>!r.regle).length;
            const rappelsEnRetard = (c.rappels||[]).filter(r=>!r.regle && r.date && r.date < today).length;
              const pct = phaseInfo(c.phase).pct;
              return (
                <div key={c.id} onClick={() => { setSelected(c.id); setForm(null); setDetailTab("infos"); }}
                  style={{ background:"#fff", border:`1.5px solid ${selected===c.id?"#1a1a1a":C.border}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", boxShadow:selected===c.id?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ fontWeight:600, fontSize:14, color:"#1a1a1a" }}>{c.nom}</span>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      {hasAlert && <span style={{ width:8, height:8, borderRadius:99, background:"#f59e0b", display:"inline-block", boxShadow:"0 0 0 2px #fef3c7" }} title="Checklist en attente" />}
                    {rappelsEnRetard > 0 && <span style={{ background:"#ef4444", color:"#fff", borderRadius:99, fontSize:9, fontWeight:700, padding:"0 5px", lineHeight:"15px" }} title="Rappels en retard">🔔{rappelsEnRetard}</span>}
                    {rappelsEnAttente > 0 && rappelsEnRetard === 0 && <span style={{ width:8, height:8, borderRadius:99, background:"#3b82f6", display:"inline-block", boxShadow:"0 0 0 2px #dbeafe" }} title={`${rappelsEnAttente} rappel(s) en attente`} />}
                      <Badge status={c.statut} />
                    </div>
                  </div>
                  <div style={{ color:C.muted, fontSize:12, marginBottom:10 }}>{c.client} · {c.commune}</div>
                  <ProgressBar value={pct} />
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
                    <span style={{ color:C.muted, fontSize:11 }}>{c.phase}</span>
                    <span style={{ color:"#1a1a1a", fontSize:11, fontWeight:700 }}>{pct}%</span>
                  </div>
                  {all.length > 0 && (
                    <div style={{ marginTop:8, display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ flex:1, background:"#eeede9", borderRadius:99, height:3 }}>
                        <div style={{ height:"100%", width:`${all.length>0?(done/all.length*100):0}%`, background: done===all.length?"#22c55e":"#1a1a1a", borderRadius:99 }} />
                      </div>
                      <span style={{ fontSize:10, color:C.muted }}>{done}/{all.length} checklist</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* détail / form */}
        <div style={{ background:"#fff", borderRadius:14, border:`1px solid ${C.border}`, overflowY:"auto", boxShadow:"0 1px 4px rgba(0,0,0,.05)", display:"flex", flexDirection:"column" }}>
          {form !== null ? (
            <div style={{ padding:22, display:"flex", flexDirection:"column", gap:14 }}>
              <h3 style={{ margin:0, color:"#1a1a1a", fontSize:13, fontWeight:700, letterSpacing:".04em", textTransform:"uppercase" }}>{form==="new"?"Nouveau chantier":"Modifier"}</h3>
              <Input label="Nom du chantier" value={draft.nom} onChange={v => setDraft(d=>({...d,nom:v}))} placeholder="Villa Les Garrigues" />
              <Input label="Client" value={draft.client} onChange={v => setDraft(d=>({...d,client:v}))} placeholder="M. / Mme ..." />
              <Input label="Commune" value={draft.commune} onChange={v => setDraft(d=>({...d,commune:v}))} />
              <Select label="Statut" value={draft.statut} onChange={v => setDraft(d=>({...d,statut:v}))} options={STATUTS} />
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <label style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:".07em", textTransform:"uppercase" }}>Phase — Avancement automatique</label>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:5 }}>
                  {phases.map(p => (
                    <button key={p.label} onClick={() => onPhaseChange(p.label)} style={{
                      background: draft.phase===p.label?"#1a1a1a":"#f5f4f0",
                      color: draft.phase===p.label?"#fff":C.muted,
                      border: `1.5px solid ${draft.phase===p.label?"#1a1a1a":C.border}`,
                      borderRadius:8, padding:"6px 8px", fontSize:11, fontWeight: draft.phase===p.label?600:400,
                      cursor:"pointer", fontFamily:"inherit", textAlign:"left", lineHeight:1.3,
                    }}>
                      <div>{p.label}</div>
                      <div style={{ fontSize:10, opacity:.7 }}>{p.pct}%</div>
                    </button>
                  ))}
                </div>
              </div>
              <Textarea label="Notes" value={draft.notes||""} onChange={v => setDraft(d=>({...d,notes:v}))} rows={3} placeholder="Observations..." />
              <div style={{ display:"flex", gap:8 }}>
                <Btn onClick={save}>Enregistrer</Btn>
                <Btn variant="ghost" onClick={() => setForm(null)}>Annuler</Btn>
                {form!=="new" && <Btn variant="danger" onClick={() => del(form)}>Supprimer</Btn>}
              </div>
            </div>
          ) : sel ? (
            <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
              <div style={{ padding:"18px 22px 0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                  <div>
                    <h2 style={{ margin:0, color:"#1a1a1a", fontSize:18, fontFamily:"'Playfair Display',serif", fontWeight:700 }}>{sel.nom}</h2>
                    <div style={{ color:C.muted, fontSize:12, marginTop:3 }}>{sel.client} · {sel.commune}</div>
                  </div>
                  <Badge status={sel.statut} />
                </div>
                <div style={{ background:"#f5f4f0", borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ color:C.muted, fontSize:12 }}>Phase : <strong style={{ color:"#1a1a1a" }}>{sel.phase}</strong></span>
                    <span style={{ color:"#1a1a1a", fontWeight:700, fontSize:13 }}>{phaseInfo(sel.phase).pct}%</span>
                  </div>
                  <ProgressBar value={phaseInfo(sel.phase).pct} />
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, overflowX:"auto" }}>
                    {phases.map((p, i) => {
                      const current = phases.findIndex(x => x.label === sel.phase);
                      const isPast = i < current, isCurrent = i === current;
                      return (
                        <div key={p.label} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, minWidth:0 }}>
                          <div style={{ width:8, height:8, borderRadius:99, background: isCurrent?"#1a1a1a":isPast?"#22c55e":"#eeede9", border:`2px solid ${isCurrent?"#1a1a1a":isPast?"#22c55e":"#d1d5db"}` }} />
                          <span style={{ fontSize:8, color:isCurrent?"#1a1a1a":isPast?C.green:C.muted, fontWeight:isCurrent?700:400, whiteSpace:"nowrap", overflow:"hidden", maxWidth:40, textOverflow:"ellipsis" }}>{p.label.split(" ")[0]}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${C.border}` }}>
                  {[["infos","📋 Infos"],["checklist","✅ Checklist"],["rappels","🔔 Rappels"]].map(([id,label]) => {
                    // badge rappels en attente
                    const rappelsEnAttente = id==="rappels" ? (sel.rappels||[]).filter(r=>!r.regle).length : 0;
                    return (
                      <button key={id} onClick={() => setDetailTab(id)} style={{
                        background:"none", border:"none", borderBottom:`2px solid ${detailTab===id?"#1a1a1a":"transparent"}`,
                        color: detailTab===id?"#1a1a1a":C.muted, padding:"8px 14px", fontSize:12, fontWeight:detailTab===id?600:400,
                        cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", gap:5,
                      }}>
                        {label}
                        {rappelsEnAttente > 0 && <span style={{ background:"#ef4444", color:"#fff", borderRadius:99, fontSize:10, fontWeight:700, padding:"0px 5px", lineHeight:"16px" }}>{rappelsEnAttente}</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{ flex:1, padding:"16px 22px 22px", overflowY:"auto" }}>
                {detailTab === "infos" ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    {sel.notes && (
                      <div style={{ background:"#f5f4f0", borderRadius:10, padding:"12px 14px" }}>
                        <div style={{ color:C.muted, fontSize:10, fontWeight:600, letterSpacing:".07em", textTransform:"uppercase", marginBottom:6 }}>Notes</div>
                        <div style={{ color:"#1a1a1a", fontSize:13, lineHeight:1.6 }}>{sel.notes}</div>
                      </div>
                    )}
                    <Btn small onClick={() => openEdit(sel)}>✏️ Modifier</Btn>
                  </div>
                ) : detailTab === "checklist" ? (
                  <ChecklistPanel chantier={sel} onUpdate={updateChantier} modeles={modeles} />
                ) : (
                  <RappelsPanel chantier={sel} onUpdate={updateChantier} phases={phases} />
                )}
              </div>
            </div>
          ) : (
            <div style={{ color:C.muted, textAlign:"center", marginTop:60, fontSize:14, padding:22 }}>
              Sélectionne un chantier<br />ou crée-en un nouveau
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ── RappelsPanel ──────────────────────────────────────────────────────────
function RappelsPanel({ chantier, onUpdate, phases }) {
  const today = new Date().toISOString().split("T")[0];
  const rappels = chantier.rappels || [];
  const [form, setForm] = useState(false);
  const [draft, setDraft] = useState({ texte:"", phase: chantier.phase, date:"", regle:false });
  const [filterPhase, setFilterPhase] = useState("Toutes");
  const [filterStatut, setFilterStatut] = useState("Tous");

  const save = () => {
    if (!draft.texte.trim()) return;
    const r = { ...draft, id: Date.now(), texte: draft.texte.trim() };
    onUpdate({ ...chantier, rappels: [r, ...rappels] });
    setDraft({ texte:"", phase: chantier.phase, date:"", regle:false });
    setForm(false);
  };

  const toggle = (id) => {
    onUpdate({ ...chantier, rappels: rappels.map(r => r.id===id ? {...r, regle:!r.regle} : r) });
  };

  const del = (id) => {
    onUpdate({ ...chantier, rappels: rappels.filter(r => r.id!==id) });
  };

  const filtered = rappels
    .filter(r => filterPhase==="Toutes" || r.phase===filterPhase)
    .filter(r => filterStatut==="Tous" || (filterStatut==="En attente" ? !r.regle : r.regle));

  const isOverdue = (r) => !r.regle && r.date && r.date < today;

  // grouper par phase
  const grouped = {};
  filtered.forEach(r => { if (!grouped[r.phase]) grouped[r.phase] = []; grouped[r.phase].push(r); });

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

      {/* barre d'outils */}
      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
        <select value={filterPhase} onChange={e => setFilterPhase(e.target.value)}
          style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 10px", fontSize:12, fontFamily:"inherit", outline:"none", flex:1 }}>
          <option>Toutes</option>
          {phases.map(p => <option key={p.label}>{p.label}</option>)}
        </select>
        <select value={filterStatut} onChange={e => setFilterStatut(e.target.value)}
          style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 10px", fontSize:12, fontFamily:"inherit", outline:"none" }}>
          {["Tous","En attente","Réglé"].map(s => <option key={s}>{s}</option>)}
        </select>
        <button onClick={() => setForm(f=>!f)} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
          {form ? "Annuler" : "+ Rappel"}
        </button>
      </div>

      {/* formulaire ajout */}
      {form && (
        <div style={{ background:"#f5f4f0", borderRadius:12, padding:14, display:"flex", flexDirection:"column", gap:10, border:`1.5px solid #1a1a1a` }}>
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase" }}>Nouveau rappel</div>
          <textarea value={draft.texte} onChange={e => setDraft(d=>({...d,texte:e.target.value}))}
            placeholder="Ex : Porte de garage à fournir par le client — modèle RAL 7016"
            rows={3}
            style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 11px", fontSize:13, fontFamily:"inherit", outline:"none", resize:"vertical" }}
            onFocus={e => e.target.style.borderColor="#1a1a1a"} onBlur={e => e.target.style.borderColor=C.border}
          />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <label style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:".06em", textTransform:"uppercase" }}>Étape associée</label>
              <select value={draft.phase} onChange={e => setDraft(d=>({...d,phase:e.target.value}))}
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 10px", fontSize:13, fontFamily:"inherit", outline:"none" }}>
                {phases.map(p => <option key={p.label}>{p.label}</option>)}
              </select>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <label style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:".06em", textTransform:"uppercase" }}>Date limite (optionnel)</label>
              <input type="date" value={draft.date} onChange={e => setDraft(d=>({...d,date:e.target.value}))}
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 10px", fontSize:13, fontFamily:"inherit", outline:"none" }}
                onFocus={e => e.target.style.borderColor="#1a1a1a"} onBlur={e => e.target.style.borderColor=C.border}
              />
            </div>
          </div>
          <button onClick={save} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"9px 20px", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>
            Enregistrer
          </button>
        </div>
      )}

      {/* liste groupée par phase */}
      {Object.keys(grouped).length === 0 && (
        <div style={{ color:C.muted, textAlign:"center", padding:"30px 0", fontSize:13 }}>
          Aucun rappel{filterPhase!=="Toutes"?` pour ${filterPhase}`:""}<br/>
          <span style={{ fontSize:12 }}>Clique sur « + Rappel » pour en ajouter un</span>
        </div>
      )}

      {Object.entries(grouped).map(([phase, items]) => (
        <div key={phase}>
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase", marginBottom:6, display:"flex", alignItems:"center", gap:6 }}>
            <span>{phase}</span>
            <span style={{ background: phase===chantier.phase?"#1a1a1a":"#eeede9", color: phase===chantier.phase?"#fff":C.muted, borderRadius:99, padding:"1px 7px", fontSize:10, fontWeight:600 }}>
              {phase===chantier.phase?"Phase actuelle":""}
            </span>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {items.map(r => {
              const overdue = isOverdue(r);
              return (
                <div key={r.id} style={{
                  background: r.regle?"#f0fdf4":"#fff",
                  border: `1.5px solid ${overdue?"#ef4444":r.regle?"#bbf7d0":C.border}`,
                  borderRadius:10, padding:"10px 14px",
                  display:"flex", gap:10, alignItems:"flex-start",
                }}>
                  {/* toggle statut */}
                  <button onClick={() => toggle(r.id)} title={r.regle?"Marquer en attente":"Marquer réglé"} style={{
                    width:20, height:20, borderRadius:6, flexShrink:0, marginTop:1,
                    border:`2px solid ${r.regle?"#22c55e":C.border}`,
                    background: r.regle?"#22c55e":"#fff",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    cursor:"pointer", transition:"all .15s",
                  }}>
                    {r.regle && <span style={{ color:"#fff", fontSize:11, fontWeight:900, lineHeight:1 }}>✓</span>}
                  </button>

                  {/* contenu */}
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, color: r.regle?C.muted:"#1a1a1a", textDecoration: r.regle?"line-through":"none", lineHeight:1.5 }}>{r.texte}</div>
                    <div style={{ display:"flex", gap:8, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                      {r.date && (
                        <span style={{
                          fontSize:11, fontWeight:600, borderRadius:6, padding:"2px 8px",
                          background: overdue?"#fee2e2":r.regle?"#d1fae5":"#f5f4f0",
                          color: overdue?"#b91c1c":r.regle?C.green:C.muted,
                          border:`1px solid ${overdue?"#fca5a5":r.regle?"#6ee7b7":C.border}`,
                        }}>
                          {overdue?"⚠️ ":"📅 "}{new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}
                        </span>
                      )}
                      <span style={{ fontSize:11, color: r.regle?C.green:C.muted, fontWeight:600 }}>
                        {r.regle?"✅ Réglé":"⏳ En attente"}
                      </span>
                    </div>
                  </div>

                  {/* supprimer */}
                  <button onClick={() => del(r.id)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, lineHeight:1, flexShrink:0, opacity:.5 }}
                    onMouseEnter={e => e.currentTarget.style.opacity=1} onMouseLeave={e => e.currentTarget.style.opacity=.5}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

        </div>
        <pre style={{ flex: 1, overflowY: "auto", margin: 0, padding: 18, color: output ? "#1a1a1a" : C.muted, fontSize: 12, lineHeight: 1.8, fontFamily: "'Courier New', monospace", whiteSpace: "pre-wrap", background: "#fafaf8", borderRadius: "0 0 14px 14px" }}>
          {output || "Remplis le formulaire et clique sur\n« Générer le CR » pour voir le résultat."}
        </pre>
      </div>
    </div>
  );
}

const CORPS = [
  { id: "go",        label: "Gros Œuvre",          icon: "🧱" },
  { id: "charpente", label: "Charpente / Couverture", icon: "🏠" },
  { id: "carrelage", label: "Carrelage",             icon: "🪟" },

];

// ── helpers partagés ───────────────────────────────────────────────────────
function ResultBox({ result }) {
  if (!result) return null;
  return (
    <div style={{ background: "#f5f4f0", borderRadius: 10, padding: "12px 14px", border: `1px solid ${C.border}` }}>
      {Object.entries(result).map(([k, v], i, arr) => (
        <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: i < arr.length - 1 ? `1px solid ${C.border}` : "none" }}>
          <span style={{ color: C.muted, fontSize: 12, fontWeight: 500 }}>{k}</span>
          <span style={{ color: "#1a1a1a", fontWeight: 700, fontSize: 13 }}>{v}</span>
        </div>
      ))}
    </div>
  );
}

function CalcCard({ title, children }) {
  return (
    <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 12, boxShadow: "0 1px 4px rgba(0,0,0,.05)" }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: ".07em", textTransform: "uppercase", paddingBottom: 8, borderBottom: `1px solid ${C.border}` }}>{title}</div>
      {children}
    </div>
  );
}

function SubToggle({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", gap: 4, background: "#f5f4f0", borderRadius: 10, padding: 4, marginBottom: 4 }}>
      {options.map(([id, label]) => (
        <button key={id} onClick={() => onChange(id)} style={{
          flex: 1, background: value === id ? "#fff" : "transparent", color: value === id ? "#1a1a1a" : C.muted,
          border: "none", borderRadius: 8, padding: "6px 8px", fontSize: 12,
          fontWeight: value === id ? 600 : 400, cursor: "pointer", fontFamily: "inherit",
          boxShadow: value === id ? "0 1px 3px rgba(0,0,0,.08)" : "none",
        }}>{label}</button>
      ))}
    </div>
  );
}

// ── GROS ŒUVRE ────────────────────────────────────────────────────────────
function CalcGO() {
  const mob = useIsMobile();
  const [sub, setSub] = useState("agglos");

  // Agglos + Poteaux
  const FORMATS_AGGLO = {
    "50×20×20 (standard)": { L:500, H:200, ep:200, pal:60,  joint:10 },
    "50×25×20":            { L:500, H:250, ep:200, pal:48,  joint:10 },
    "50×20×15":            { L:500, H:200, ep:150, pal:80,  joint:10 },
    "50×20×10":            { L:500, H:200, ep:100, pal:120, joint:10 },
  };
  const POTEAU_H_AGGLO = 0.21;

  const [fmtAgglo, setFmtAgglo] = useState("50×20×20 (standard)");
  const [vAgglo, setVAgglo]     = useState({});
  const [ouvs, setOuvs]         = useState([{ id:1, label:"Porte/fenêtre", L:"", H:"", qty:1 }]);
  const [poteaux, setPoteaux]   = useState([]);
  const [resAgglo, setResAgglo] = useState(null);

  const addPoteau = () => setPoteaux(p => [...p, { id:Date.now(), label:"Poteau", H:"", qty:1 }]);
  const updPoteau = (id, k, v) => setPoteaux(p => p.map(x => x.id===id ? {...x,[k]:v} : x));
  const delPoteau = (id) => setPoteaux(p => p.filter(x => x.id!==id));

  // Béton
  const [vBeton, setVBeton] = useState({});
  const [typeBeton, setTypeBeton] = useState("Semelle filante");
  const [resBeton, setResBeton] = useState(null);
  const BETON_CONFIGS = {
    "Semelle filante":   { fields:[["L","Longueur (m)"],["l","Largeur (m)"],["h","Hauteur (m)"]], calc: v => ({ "Volume béton": `${(v.L*v.l*v.h).toFixed(2)} m³` }) },
    "Dalle / Radier":    { fields:[["L","Longueur (m)"],["l","Largeur (m)"],["e","Épaisseur (m)"]], calc: v => ({ "Volume béton": `${(v.L*v.l*v.e).toFixed(2)} m³` }) },
    "Poteau carré":      { fields:[["a","Côté (m)"],["h","Hauteur (m)"],["n","Nombre"]], calc: v => ({ "Volume béton total": `${(v.a*v.a*v.h*v.n).toFixed(2)} m³` }) },
    "Poteau circulaire": { fields:[["d","Diamètre (m)"],["h","Hauteur (m)"],["n","Nombre"]], calc: v => ({ "Volume béton total": `${(Math.PI*(v.d/2)**2*v.h*v.n).toFixed(2)} m³` }) },
    "Terrassement":      { fields:[["L","Longueur (m)"],["l","Largeur (m)"],["p","Profondeur (m)"]], calc: v => ({ "Volume fouille": `${(v.L*v.l*v.p).toFixed(2)} m³`, "Remblai ×1.3": `${(v.L*v.l*v.p*1.3).toFixed(2)} m³` }) },
  };
  const bcConf = BETON_CONFIGS[typeBeton];
  const calcBeton = () => {
    const vals = Object.fromEntries(bcConf.fields.map(([k]) => [k, parseFloat(vBeton[k]||0)]));
    setResBeton(bcConf.calc(vals));
  };

  // Sable / Granulats
  const GRANULATS = {
    "Sable 0/2 (fin)":        1.50,
    "Sable 0/4 (maçonnerie)": 1.55,
    "Sable 0/4 concassé":     1.65,
    "Grave 0/20":             1.80,
    "Grave 0/31,5":           1.85,
    "Tout-venant 0/80":       1.90,
  };
  const [granulat, setGranulat] = useState("Sable 0/4 (maçonnerie)");
  const [modeG, setModeG]       = useState("surface");
  const [vGran, setVGran]       = useState({});
  const [resGran, setResGran]   = useState(null);
  const calcGran = () => {
    const mv  = GRANULATS[granulat];
    const vol = modeG === "surface" ? parseFloat(vGran.L||0)*parseFloat(vGran.l||0)*(parseFloat(vGran.e||0)/100) : parseFloat(vGran.vol||0);
    const volCmd = vol * 1.15;
    setResGran({ "Volume compacté": `${vol.toFixed(2)} m³`, "Volume à commander +15%": `${volCmd.toFixed(2)} m³`, "Tonnage net": `${(vol*mv).toFixed(2)} t`, "Tonnage à commander": `${(volCmd*mv).toFixed(2)} t` });
  };

  const calcAgglo = () => {
    const f    = FORMATS_AGGLO[fmtAgglo];
    const bL   = (f.L + f.joint) / 1000;
    const bH   = (f.H + f.joint) / 1000;
    const u_m2 = 1 / (bL * bH);
    const murL = parseFloat(vAgglo.L||0);
    const murH = parseFloat(vAgglo.H||0);
    const surfB = murL * murH;
    const surfO = ouvs.reduce((s,o) => s + parseFloat(o.L||0)*parseFloat(o.H||0)*(o.qty||1), 0);

    const poteauxCalc = poteaux.map(p => {
      const hp    = parseFloat(p.H||0);
      const qty   = p.qty || 1;
      const surf  = 0.20 * hp * qty;
      const rangs = Math.ceil(hp / POTEAU_H_AGGLO) * qty;
      return { label: p.label, hp, qty, surf, rangs };
    });
    const surfTotPoteaux  = poteauxCalc.reduce((s,p) => s + p.surf, 0);
    const qTotPoteauxNet  = poteauxCalc.reduce((s,p) => s + p.rangs, 0);
    const surfNette       = Math.max(0, surfB - surfO - surfTotPoteaux);
    const qCourantsCmd    = Math.ceil(Math.ceil(surfNette * u_m2) * 1.05);
    const qPoteauxCmd     = Math.ceil(qTotPoteauxNet * 1.05);
    const qTotal          = qCourantsCmd + qPoteauxCmd;
    const palEnt = Math.floor(qTotal / f.pal), palRest = qTotal % f.pal;
    const palLabel = palRest > 0
      ? `${palEnt} palette${palEnt>1?"s":""} + ${palRest} agglo${palRest>1?"s":""}`
      : `${palEnt} palette${palEnt>1?"s":""} pile`;

    const res = {
      "Surface brute"         : `${surfB.toFixed(2)} m²`,
      "– Ouvertures"          : `– ${surfO.toFixed(2)} m²`,
    };
    poteauxCalc.forEach(p => {
      const label = p.qty > 1
        ? `– ${p.qty}× Poteau "${p.label}" (0.20 × ${p.hp}m)`
        : `– Poteau "${p.label}" (0.20 × ${p.hp}m)`;
      res[label] = `– ${p.surf.toFixed(2)} m²  →  ${p.rangs} agglos poteaux`;
    });
    res["Surface nette mur courant"] = `${surfNette.toFixed(2)} m²`;
    res["─────────────────"] = "─────────────────";
    res["Agglos courants +5%"] = `${qCourantsCmd} u`;
    res["Agglos poteaux +5%"]  = qTotPoteauxNet > 0 ? `${qPoteauxCmd} u` : "0 u (aucun poteau)";
    res["──────────────────"] = "─────────────────";
    res["🧱 TOTAL à commander"] = `${qTotal} agglo${qTotal>1?"s":""}`;
    res[`📦 Palettes (${f.pal} u/pal)`] = palLabel;
    setResAgglo(res);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      {/* AGGLOS + POTEAUX */}
      <CalcCard title="Agglos & Poteaux — Quantité & Palettes">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <Select label="Format agglo courant" value={fmtAgglo} onChange={v => { setFmtAgglo(v); setResAgglo(null); }} options={Object.keys(FORMATS_AGGLO)} />
          <div style={{ background:"#f5f4f0", borderRadius:10, padding:"9px 13px", fontSize:12, color:C.muted, display:"flex", alignItems:"center" }}>
            {(() => { const f=FORMATS_AGGLO[fmtAgglo]; return `${f.L}×${f.H}×${f.ep} mm · ${f.pal} u/pal`; })()}
          </div>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <Input label="Longueur mur (m)" value={vAgglo.L||""} onChange={v => setVAgglo(p=>({...p,L:v}))} type="number" placeholder="12" />
          <Input label="Hauteur mur (m)"  value={vAgglo.H||""} onChange={v => setVAgglo(p=>({...p,H:v}))} type="number" placeholder="2.50" />
        </div>

        {/* liste unifiée ouvertures + poteaux */}
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          {/* en-têtes */}
          <div style={{ display:"grid", gridTemplateColumns:"80px 1fr 56px 56px 72px 26px", gap:6, paddingBottom:4, borderBottom:`1px solid ${C.border}` }}>
            {["Type","Nom","L (m)","H (m)","Qté",""].map((h,i) => (
              <span key={i} style={{ fontSize:10, fontWeight:700, color:C.muted, letterSpacing:".06em", textTransform:"uppercase", textAlign: i>=4?"center":"left" }}>{h}</span>
            ))}
          </div>

          {/* ouvertures */}
          {ouvs.map(o => (
            <div key={o.id} style={{ display:"grid", gridTemplateColumns:"80px 1fr 56px 56px 72px 26px", gap:6, alignItems:"center" }}>
              <span style={{ fontSize:11, fontWeight:600, color:C.blue, background:"#dbeafe", borderRadius:6, padding:"3px 4px", textAlign:"center" }}>Ouverture</span>
              <input value={o.label} onChange={e => setOuvs(p=>p.map(x=>x.id===o.id?{...x,label:e.target.value}:x))} placeholder="Fenêtre, porte…"
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
              <input type="number" value={o.L} onChange={e => setOuvs(p=>p.map(x=>x.id===o.id?{...x,L:e.target.value}:x))} placeholder="L"
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 4px", fontSize:12, fontFamily:"inherit", outline:"none", width:"100%", textAlign:"center" }} />
              <input type="number" value={o.H} onChange={e => setOuvs(p=>p.map(x=>x.id===o.id?{...x,H:e.target.value}:x))} placeholder="H"
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 4px", fontSize:12, fontFamily:"inherit", outline:"none", width:"100%", textAlign:"center" }} />
              {/* compteur quantité */}
              <div style={{ display:"flex", alignItems:"center", gap:3, justifyContent:"center" }}>
                <button onClick={() => setOuvs(p=>p.map(x=>x.id===o.id?{...x,qty:Math.max(1,(x.qty||1)-1)}:x))}
                  style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${C.border}`, background:"#fff", color:"#1a1a1a", cursor:"pointer", fontSize:14, lineHeight:1, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                <span style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", minWidth:16, textAlign:"center" }}>{o.qty||1}</span>
                <button onClick={() => setOuvs(p=>p.map(x=>x.id===o.id?{...x,qty:(x.qty||1)+1}:x))}
                  style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${C.border}`, background:"#fff", color:"#1a1a1a", cursor:"pointer", fontSize:14, lineHeight:1, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
              </div>
              <button onClick={() => setOuvs(p=>p.filter(x=>x.id!==o.id))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:17 }}>×</button>
            </div>
          ))}

          {/* poteaux */}
          {poteaux.map(p => (
            <div key={p.id} style={{ display:"grid", gridTemplateColumns:"80px 1fr 56px 56px 72px 26px", gap:6, alignItems:"center" }}>
              <span style={{ fontSize:11, fontWeight:600, color:"#92400e", background:"#fef3c7", borderRadius:6, padding:"3px 4px", textAlign:"center" }}>Poteau</span>
              <input value={p.label} onChange={e => updPoteau(p.id,"label",e.target.value)} placeholder="Poteau…"
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
              <div style={{ background:"#f5f4f0", borderRadius:8, padding:"5px 4px", fontSize:12, color:C.muted, textAlign:"center", border:`1px solid ${C.border}` }}>0.20</div>
              <input type="number" value={p.H} onChange={e => updPoteau(p.id,"H",e.target.value)} placeholder="H"
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"5px 4px", fontSize:12, fontFamily:"inherit", outline:"none", width:"100%", textAlign:"center" }} />
              {/* compteur quantité */}
              <div style={{ display:"flex", alignItems:"center", gap:3, justifyContent:"center" }}>
                <button onClick={() => updPoteau(p.id,"qty",Math.max(1,(p.qty||1)-1))}
                  style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${C.border}`, background:"#fff", color:"#1a1a1a", cursor:"pointer", fontSize:14, lineHeight:1, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>
                <span style={{ fontSize:13, fontWeight:700, color:"#1a1a1a", minWidth:16, textAlign:"center" }}>{p.qty||1}</span>
                <button onClick={() => updPoteau(p.id,"qty",(p.qty||1)+1)}
                  style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${C.border}`, background:"#fff", color:"#1a1a1a", cursor:"pointer", fontSize:14, lineHeight:1, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
              </div>
              <button onClick={() => delPoteau(p.id)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:17 }}>×</button>
            </div>
          ))}

          {/* boutons ajouter */}
          <div style={{ display:"flex", gap:8, marginTop:4 }}>
            <button onClick={() => setOuvs(p=>[...p,{id:Date.now(),label:"Fenêtre",L:"",H:"",qty:1}])}
              style={{ background:"#fff", border:`1.5px solid ${C.blue}`, color:C.blue, borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
              + Ouverture
            </button>
            <button onClick={addPoteau}
              style={{ background:"#fff", border:"1.5px solid #d97706", color:"#92400e", borderRadius:8, padding:"5px 12px", fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
              + Poteau
            </button>
          </div>
        </div>

        <button onClick={calcAgglo} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>

        {resAgglo && (
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {/* détail surface + agglos */}
            <div style={{ background:"#f5f4f0", borderRadius:10, padding:"12px 14px", border:`1px solid ${C.border}` }}>
              {Object.entries(resAgglo).filter(([k]) => !k.startsWith("🧱") && !k.startsWith("📦")).map(([k, v], i, arr) => {
                const isSep = v === "─────────────────";
                return isSep ? (
                  <div key={i} style={{ height:1, background:C.border, margin:"6px 0" }} />
                ) : (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"3px 0" }}>
                    <span style={{ color:C.muted, fontSize:12 }}>{k}</span>
                    <span style={{ color:"#1a1a1a", fontWeight:600, fontSize:12 }}>{v}</span>
                  </div>
                );
              })}
            </div>
            {/* bloc total mis en valeur */}
            <div style={{ background:"#1a1a1a", borderRadius:10, padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                <span style={{ color:"#9ca3af", fontSize:11, fontWeight:600, letterSpacing:".06em", textTransform:"uppercase" }}>Total à commander</span>
                <span style={{ color:"#fff", fontWeight:800, fontSize:22 }}>{resAgglo["🧱 TOTAL à commander"]}</span>
              </div>
              <div style={{ textAlign:"right" }}>
                <span style={{ color:"#9ca3af", fontSize:11, fontWeight:600, letterSpacing:".06em", textTransform:"uppercase", display:"block" }}>Palettes</span>
                <span style={{ color:"#fff", fontWeight:700, fontSize:14 }}>{resAgglo[Object.keys(resAgglo).find(k=>k.startsWith("📦"))]}</span>
              </div>
            </div>
          </div>
        )}

        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ Poteau 20×20×50 cm, joint 10 mm → 21 cm/rang. Largeur fixe 20 cm. +5% casse inclus.</div>
      </CalcCard>

      {/* BÉTON */}
      <CalcCard title="Béton — Volumes">
        <Select label="Type d'ouvrage" value={typeBeton} onChange={v => { setTypeBeton(v); setVBeton({}); setResBeton(null); }} options={Object.keys(BETON_CONFIGS)} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {bcConf.fields.map(([k, label]) => (
            <Input key={k} label={label} value={vBeton[k]||""} onChange={v => setVBeton(p=>({...p,[k]:v}))} type="number" placeholder="0" />
          ))}
        </div>
        <button onClick={calcBeton} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resBeton} />
      </CalcCard>

      {/* SABLE & GRANULATS */}
      <CalcCard title="Sable & Granulats — Tonnage">
        <SubToggle options={[["surface","📐 Surface + épaisseur"],["volume","📦 Volume connu"]]} value={modeG} onChange={v => { setModeG(v); setVGran({}); setResGran(null); }} />
        <Select label="Type de granulat" value={granulat} onChange={v => { setGranulat(v); setResGran(null); }} options={Object.keys(GRANULATS)} />
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}` }}>
          Masse volumique : <strong style={{ color:"#1a1a1a" }}>{GRANULATS[granulat]} t/m³</strong>
        </div>
        {modeG === "surface" ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            <Input label="Longueur (m)" value={vGran.L||""} onChange={v => setVGran(p=>({...p,L:v}))} type="number" placeholder="0" />
            <Input label="Largeur (m)"  value={vGran.l||""} onChange={v => setVGran(p=>({...p,l:v}))} type="number" placeholder="0" />
            <Input label="Épaisseur (cm)" value={vGran.e||""} onChange={v => setVGran(p=>({...p,e:v}))} type="number" placeholder="10" />
          </div>
        ) : (
          <Input label="Volume (m³)" value={vGran.vol||""} onChange={v => setVGran(p=>({...p,vol:v}))} type="number" placeholder="0" />
        )}
        <button onClick={calcGran} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resGran} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ +15% foisonnement livraison inclus.</div>
      </CalcCard>
    </div>
  );
}

// ── CHARPENTE / COUVERTURE ─────────────────────────────────────────────────
function CalcCharpente() {
  // Tuiles
  const TUILES = {
    "Tuile canal (30 u/m²)":     { u_m2: 30, pal: 200 },
    "Tuile romane (15 u/m²)":    { u_m2: 15, pal: 180 },
    "Tuile mécanique (12 u/m²)": { u_m2: 12, pal: 144 },
    "Tuile plate (60 u/m²)":     { u_m2: 60, pal: 250 },
    "Ardoise (25 u/m²)":         { u_m2: 25, pal: 300 },
  };
  const [typeTuile, setTypeTuile] = useState("Tuile canal (30 u/m²)");
  const [vTuile, setVTuile] = useState({});
  const [resTuile, setResTuile] = useState(null);
  const calcTuile = () => {
    const f = TUILES[typeTuile];
    // Toiture 2 pans
    const L = parseFloat(vTuile.L||0), l = parseFloat(vTuile.l||0), h = parseFloat(vTuile.h||0);
    const ramp = Math.sqrt((l/2)**2 + h**2);
    const surf = 2 * L * ramp;
    const qNet = Math.ceil(surf * f.u_m2);
    const qTot = Math.ceil(qNet * 1.05);
    const palEnt = Math.floor(qTot / f.pal), palRest = qTot % f.pal;
    const palLabel = palRest > 0 ? `${palEnt} pal. + ${palRest} u` : `${palEnt} palette${palEnt>1?"s":""} pile`;
    setResTuile({ "Longueur rampant": `${ramp.toFixed(2)} m`, "Surface toiture": `${surf.toFixed(2)} m²`, "Tuiles nettes": `${qNet} u`, "Tuiles +5% casse": `${qTot} u`, [`Palettes (${f.pal} u/pal)`]: palLabel });
  };

  // Faîtières
  const [vFait, setVFait] = useState({});
  const [resFait, setResFait] = useState(null);
  const calcFait = () => {
    // Faîtière canal : ~3 pièces/ml, faîtière mécanique : ~4 pièces/ml
    const L = parseFloat(vFait.L||0);
    const pml = parseFloat(vFait.pml||3); // pièces par mètre linéaire
    const nb = Math.ceil(L * pml * 1.05);
    setResFait({
      "Longueur faîtière": `${L.toFixed(2)} m`,
      "Faîtières nettes": `${Math.ceil(L * pml)} u`,
      "Faîtières +5% casse": `${nb} u`,
    });
  };

  // Tuiles de rive gauche / droite
  const [vRive, setVRive] = useState({});
  const [resRive, setResRive] = useState(null);
  const calcRive = () => {
    const ramp = Math.sqrt((parseFloat(vTuile.l||vRive.l||0)/2)**2 + parseFloat(vTuile.h||vRive.h||0)**2);
    const Lr = ramp || parseFloat(vRive.ramp||0);
    const pml = parseFloat(vRive.pml||4); // pièces par mètre linéaire (tuile mécanique ≈ 4/ml)
    const nbParRive = Math.ceil(Lr * pml * 1.05);
    setResRive({
      "Longueur rampant": `${Lr.toFixed(2)} m`,
      "Tuiles rive / côté +5%": `${nbParRive} u`,
      "Total rive gauche + droite": `${nbParRive * 2} u (× 2 pans)`,
    });
  };

  // Génoise
  const [vGen, setVGen] = useState({});
  const [resGen, setResGen] = useState(null);
  const calcGen = () => {
    const perim = parseFloat(vGen.perim||0);
    const rangs = parseInt(vGen.rangs||2);
    // Tuile canal : ~8 u/ml pour génoise à 2 rangs (3 pièces couvrant + 3 dessous par ml × rangs)
    const uml = 5 * rangs; // ~5 u/ml/rang
    const nbNet = Math.ceil(perim * uml);
    const nbCmd = Math.ceil(nbNet * 1.08);
    setResGen({
      "Périmètre débord": `${perim.toFixed(2)} m`,
      "Nombre de rangs": `${rangs}`,
      "Tuiles génoises nettes": `${nbNet} u`,
      "Tuiles génoises +8% casse": `${nbCmd} u`,
    });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      <CalcCard title="Tuiles courantes — Quantité & Palettes">
        <Select label="Type de tuile" value={typeTuile} onChange={v => { setTypeTuile(v); setResTuile(null); }} options={Object.keys(TUILES)} />
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}` }}>
          Densité : <strong style={{ color:"#1a1a1a" }}>{TUILES[typeTuile].u_m2} u/m²</strong> · {TUILES[typeTuile].pal} u/palette
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <Input label="Longueur faîtière (m)" value={vTuile.L||""} onChange={v => setVTuile(p=>({...p,L:v}))} type="number" placeholder="10" />
          <Input label="Largeur hors tout (m)" value={vTuile.l||""} onChange={v => setVTuile(p=>({...p,l:v}))} type="number" placeholder="8" />
          <Input label="Hauteur faîtage (m)"   value={vTuile.h||""} onChange={v => setVTuile(p=>({...p,h:v}))} type="number" placeholder="2" />
        </div>
        <button onClick={calcTuile} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resTuile} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ Toiture 2 pans. +5% casse inclus.</div>
      </CalcCard>

      <CalcCard title="Tuiles faîtières">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <Input label="Longueur du faîtage (m)" value={vFait.L||""} onChange={v => setVFait(p=>({...p,L:v}))} type="number" placeholder="10" />
          <Input label="Pièces par mètre linéaire" value={vFait.pml||""} onChange={v => setVFait(p=>({...p,pml:v}))} type="number" placeholder="3 (canal) / 4 (méca)" />
        </div>
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}` }}>
          Tuile canal ≈ <strong style={{color:"#1a1a1a"}}>3 u/ml</strong> · Tuile mécanique ≈ <strong style={{color:"#1a1a1a"}}>4 u/ml</strong>
        </div>
        <button onClick={calcFait} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resFait} />
      </CalcCard>

      <CalcCard title="Tuiles de rive (gauche & droite)">
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}`, marginBottom:4 }}>
          Si tu as déjà renseigné la largeur et hauteur dans « Tuiles courantes », la longueur du rampant est reprise automatiquement.
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <Input label="Largeur hors tout (m) — si différente" value={vRive.l||""} onChange={v => setVRive(p=>({...p,l:v}))} type="number" placeholder="Laisser vide si déjà renseigné" />
          <Input label="Hauteur faîtage (m) — si différente"   value={vRive.h||""} onChange={v => setVRive(p=>({...p,h:v}))} type="number" placeholder="Laisser vide si déjà renseigné" />
          <Input label="Longueur rampant (m) — optionnel"       value={vRive.ramp||""} onChange={v => setVRive(p=>({...p,ramp:v}))} type="number" placeholder="Si connu directement" />
          <Input label="Pièces par mètre linéaire"              value={vRive.pml||""} onChange={v => setVRive(p=>({...p,pml:v}))} type="number" placeholder="4" />
        </div>
        <button onClick={calcRive} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resRive} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ +5% casse inclus. Résultat donné par rive puis total gauche + droite.</div>
      </CalcCard>

      <CalcCard title="Génoise (tuiles canal)">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <Input label="Périmètre de la génoise (m)" value={vGen.perim||""} onChange={v => setVGen(p=>({...p,perim:v}))} type="number" placeholder="Ex : 42" />
          <Select label="Nombre de rangs" value={vGen.rangs||"2"} onChange={v => setVGen(p=>({...p,rangs:v}))} options={["1","2","3","4"]} />
        </div>
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}` }}>
          Génoise à {vGen.rangs||2} rang{(vGen.rangs||2)>1?"s":""} ≈ <strong style={{color:"#1a1a1a"}}>{5*(parseInt(vGen.rangs||2))} u/ml</strong> (tuile canal)
        </div>
        <button onClick={calcGen} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resGen} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ +8% casse inclus (pose en biais plus exigeante). Densité basée sur tuile canal — vérifier avec votre fournisseur.</div>
      </CalcCard>
    </div>
  );
}

// ── CARRELAGE ─────────────────────────────────────────────────────────────
function CalcCarrelage() {
  const [vCarr, setVCarr] = useState({});
  const [formatCarr, setFormatCarr] = useState("60×60");
  const [resCarr, setResCarr] = useState(null);
  const [resSable, setResSable] = useState(null);
  const [resCiment, setResCiment] = useState(null);
  const [resColle, setResColle] = useState(null);
  const [typeColle, setTypeColle] = useState("Colle C1 (3 kg/m²)");

  const FORMATS_CARR = { "30×30": 0.09, "40×40": 0.16, "60×60": 0.36, "80×80": 0.64, "120×60": 0.72 };
  const COLLES = { "Colle C1 (3 kg/m²)": 3, "Colle C2 (4 kg/m²)": 4, "Colle flex (5 kg/m²)": 5 };
  // Sac de colle = 25 kg

  const calc = () => {
    const L = parseFloat(vCarr.L||0), l = parseFloat(vCarr.l||0);
    const surf = L * l;
    const surfCmd = surf * 1.10; // +10% chutes
    const u_m2 = 1 / FORMATS_CARR[formatCarr];
    const nbCarreaux = Math.ceil(surfCmd * u_m2);

    // Chape / lit de pose : sable 0/4 + ciment (dosage 400 kg/m³, épaisseur 3cm)
    const eChape = parseFloat(vCarr.eChape || 3) / 100;
    const volChape = surf * eChape;
    const tonneSable = parseFloat((volChape * 1.55 * 0.75).toFixed(2)); // 75% sable
    const nbSacCiment = Math.ceil(volChape * 400 / 35); // sac 35kg

    // Colle
    const kgColle = surf * COLLES[typeColle];
    const nbSacColle = Math.ceil(kgColle / 25);

    // Joints (sac 5kg couvre ~5 m²)
    const nbSacJoint = Math.ceil(surf / 5);

    setResCarr({ "Surface brute": `${surf.toFixed(2)} m²`, "Surface à commander (+10%)": `${surfCmd.toFixed(2)} m²`, "Nombre de carreaux": `${nbCarreaux} u` });
    setResSable({ "Épaisseur chape": `${(eChape*100).toFixed(0)} cm`, "Sable 0/4 chape": `${tonneSable} t`, "Sacs ciment 35kg": `${nbSacCiment} sacs` });
    setResColle({ "Colle nécessaire": `${kgColle.toFixed(0)} kg`, "Sacs de colle 25kg": `${nbSacColle} sacs`, "Sacs de joint 5kg": `${nbSacJoint} sacs` });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <CalcCard title="Surface & Carreaux">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <Input label="Longueur (m)" value={vCarr.L||""} onChange={v => setVCarr(p=>({...p,L:v}))} type="number" placeholder="8" />
          <Input label="Largeur (m)"  value={vCarr.l||""} onChange={v => setVCarr(p=>({...p,l:v}))} type="number" placeholder="5" />
          <Select label="Format carreau" value={formatCarr} onChange={v => setFormatCarr(v)} options={Object.keys(FORMATS_CARR)} />
        </div>
        <ResultBox result={resCarr} />
      </CalcCard>

      <CalcCard title="Chape de pose — Sable & Ciment">
        <Input label="Épaisseur chape (cm)" value={vCarr.eChape||""} onChange={v => setVCarr(p=>({...p,eChape:v}))} type="number" placeholder="3" />
        <ResultBox result={resSable} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ Dosage 400 kg ciment/m³, sable 0/4 – ratio 75%.</div>
      </CalcCard>

      <CalcCard title="Colle & Joints">
        <Select label="Type de colle" value={typeColle} onChange={v => setTypeColle(v)} options={Object.keys(COLLES)} />
        <ResultBox result={resColle} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ Sacs de colle 25 kg, sacs de joint 5 kg (~5 m²/sac).</div>
      </CalcCard>

      <button onClick={calc} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"11px 26px", fontWeight:600, fontSize:14, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start", boxShadow:"0 1px 4px rgba(0,0,0,.15)" }}>
        Tout calculer
      </button>
    </div>
  );
}

// ── ENDUIT / CRÉPI ────────────────────────────────────────────────────────
function CalcEnduit() {
  const ENDUITS = {
    "Enduit traditionnel 3 couches (20 kg/m²)": { conso: 20, sac: 25 },
    "Enduit monocouche (12 kg/m²)":             { conso: 12, sac: 25 },
    "Crépi projeté (8 kg/m²)":                  { conso: 8,  sac: 25 },
    "Enduit de finition (3 kg/m²)":             { conso: 3,  sac: 25 },
    "Enduit hydraulique (15 kg/m²)":            { conso: 15, sac: 30 },
  };
  // Sable : 1 m² enduit 20 mm ≈ 30 kg sable 0/4 (pour enduit tradition.)
  const [typeEnd, setTypeEnd] = useState("Enduit traditionnel 3 couches (20 kg/m²)");
  const [vEnd, setVEnd] = useState({});
  const [ouvEnd, setOuvEnd] = useState([]);
  const [resEnd, setResEnd] = useState(null);

  const calc = () => {
    const f = ENDUITS[typeEnd];
    const surfB = parseFloat(vEnd.L||0) * parseFloat(vEnd.H||0);
    const surfO = ouvEnd.reduce((s,o) => s + parseFloat(o.L||0)*parseFloat(o.H||0), 0);
    const surfN = Math.max(0, surfB - surfO);
    const surfCmd = surfN * 1.10;
    const kgEnd = surfCmd * f.conso;
    const nbSacs = Math.ceil(kgEnd / f.sac);
    // Sable (uniquement enduit trad.)
    const kgSable = typeEnd.includes("traditionnel") ? surfCmd * 30 : 0;
    const tonneSable = kgSable > 0 ? `${(kgSable/1000).toFixed(2)} t` : "N/A (enduit prêt à l'emploi)";
    setResEnd({
      "Surface brute": `${surfB.toFixed(2)} m²`,
      "Surface ouvertures": `${surfO.toFixed(2)} m²`,
      "Surface nette +10%": `${surfCmd.toFixed(2)} m²`,
      [`Enduit (sacs ${f.sac} kg)`]: `${nbSacs} sacs (${kgEnd.toFixed(0)} kg)`,
      "Sable 0/4 nécessaire": tonneSable,
    });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <CalcCard title="Enduit / Crépi — Quantité & Sable">
        <Select label="Type d'enduit" value={typeEnd} onChange={v => { setTypeEnd(v); setResEnd(null); }} options={Object.keys(ENDUITS)} />
        <div style={{ background:"#f5f4f0", borderRadius:8, padding:"7px 11px", fontSize:12, color:C.muted, border:`1px solid ${C.border}` }}>
          Consommation : <strong style={{ color:"#1a1a1a" }}>{ENDUITS[typeEnd].conso} kg/m²</strong> · Sacs de {ENDUITS[typeEnd].sac} kg
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <Input label="Longueur façade (m)" value={vEnd.L||""} onChange={v => setVEnd(p=>({...p,L:v}))} type="number" placeholder="15" />
          <Input label="Hauteur façade (m)"  value={vEnd.H||""} onChange={v => setVEnd(p=>({...p,H:v}))} type="number" placeholder="6" />
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <label style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:".07em", textTransform:"uppercase" }}>Déduire les ouvertures</label>
            <button onClick={() => setOuvEnd(p=>[...p,{id:Date.now(),label:"Ouverture",L:"",H:""}])} style={{ background:"#fff", border:`1.5px solid ${C.border}`, color:"#1a1a1a", borderRadius:8, padding:"3px 12px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+ Ajouter</button>
          </div>
          {ouvEnd.map(o => (
            <div key={o.id} style={{ display:"flex", gap:6, alignItems:"center" }}>
              <input value={o.label} onChange={e => setOuvEnd(p=>p.map(x=>x.id===o.id?{...x,label:e.target.value}:x))} style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"6px 8px", fontSize:12, width:100, fontFamily:"inherit", outline:"none" }} />
              <input type="number" value={o.L} onChange={e => setOuvEnd(p=>p.map(x=>x.id===o.id?{...x,L:e.target.value}:x))} placeholder="L (m)" style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"6px 8px", fontSize:12, width:65, fontFamily:"inherit", outline:"none" }} />
              <input type="number" value={o.H} onChange={e => setOuvEnd(p=>p.map(x=>x.id===o.id?{...x,H:e.target.value}:x))} placeholder="H (m)" style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"6px 8px", fontSize:12, width:65, fontFamily:"inherit", outline:"none" }} />
              <button onClick={() => setOuvEnd(p=>p.filter(x=>x.id!==o.id))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:18 }}>×</button>
            </div>
          ))}
        </div>
        <button onClick={calc} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:10, padding:"10px 22px", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>Calculer</button>
        <ResultBox result={resEnd} />
        <div style={{ color:C.muted, fontSize:11 }}>ℹ️ +10% pertes et reprises inclus. Sable uniquement pour enduit traditionnel.</div>
      </CalcCard>
    </div>
  );
}
