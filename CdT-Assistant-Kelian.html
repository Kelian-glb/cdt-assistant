// TAB 4 — DOCUMENTS (import PDF par chantier)
// ══════════════════════════════════════════════════════════════════════════
const DOC_TYPES = ["Plan", "CCTP", "Notice", "Devis", "Rapport", "Autre"];

function TabDocuments() {
  const mob = useIsMobile();
  const [chantiers] = useLocalStorage("cdx_chantiers", INIT_CHANTIERS);
  const [docs, setDocs] = useLocalStorage("cdx_docs_meta", []); // métadonnées sans base64
  const [filterChantier, setFilterChantier] = useState("Tous");
  const [filterType, setFilterType] = useState("Tous");
  const [viewing, setViewing] = useState(null); // { nom, dataUrl }
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ nom: "", chantier: "", type: "Plan" });
  const [pdfData, setPdfData] = useState(null); // base64 en mémoire seulement

  // Les PDF sont stockés en mémoire de session (trop lourds pour localStorage)
  const [pdfStore, setPdfStore] = useState({}); // id -> dataUrl

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file || file.type !== "application/pdf") return;
    const reader = new FileReader();
    reader.onload = ev => setPdfData({ dataUrl: ev.target.result, nom: file.name });
    reader.readAsDataURL(file);
    setDraft(d => ({ ...d, nom: file.name.replace(".pdf", "") }));
  };

  const saveDoc = () => {
    if (!pdfData || !draft.chantier) return;
    const id = Date.now();
    const meta = { id, nom: draft.nom || pdfData.nom, chantier: draft.chantier, type: draft.type, date: new Date().toLocaleDateString("fr-FR") };
    setDocs(prev => [meta, ...prev]);
    setPdfStore(prev => ({ ...prev, [id]: pdfData.dataUrl }));
    setPdfData(null);
    setDraft({ nom: "", chantier: "", type: "Plan" });
    setAdding(false);
  };

  const delDoc = (id) => {
    setDocs(prev => prev.filter(d => d.id !== id));
    setPdfStore(prev => { const n = { ...prev }; delete n[id]; return n; });
    if (viewing && viewing.id === id) setViewing(null);
  };

  const openDoc = (doc) => {
    const dataUrl = pdfStore[doc.id];
    if (!dataUrl) { alert("Ce document n'est plus disponible en mémoire. Veuillez le ré-importer (les PDFs sont conservés uniquement pendant la session en cours)."); return; }
    setViewing({ ...doc, dataUrl });
  };

  const filtered = docs.filter(d =>
    (filterChantier === "Tous" || d.chantier === filterChantier) &&
    (filterType === "Tous" || d.type === filterType)
  );

  const chantiersNoms = ["Tous", ...chantiers.map(c => c.nom)];

  return (
    <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : (viewing ? "320px 1fr" : "1fr"), gap: 16, height: mob ? "auto" : "calc(100vh - 130px)" }}>

      {/* panneau gauche : liste */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 0 }}>
        {/* barre d'outils */}
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
          <select value={filterChantier} onChange={e => setFilterChantier(e.target.value)}
            style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "6px 10px", fontSize: 12, flex: 1, fontFamily: "inherit", outline: "none" }}>
            {chantiersNoms.map(n => <option key={n}>{n}</option>)}
          </select>
          <select value={filterType} onChange={e => setFilterType(e.target.value)}
            style={{ background: "#fff", border: `1.5px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "6px 10px", fontSize: 12, fontFamily: "inherit", outline: "none" }}>
            {["Tous", ...DOC_TYPES].map(t => <option key={t}>{t}</option>)}
          </select>
          <Btn small onClick={() => { setAdding(true); setViewing(null); }}>+ Importer</Btn>
        </div>

        {/* formulaire d'import */}
        {adding && (
          <div style={{ background: "#fff", border: `1.5px solid #1a1a1a`, borderRadius: 12, padding: 16, display: "flex", flexDirection: "column", gap: 12, boxShadow: "0 2px 12px rgba(0,0,0,.08)" }}>
            <h3 style={{ margin: 0, color: "#1a1a1a", fontSize: 11, fontWeight: 700, letterSpacing: ".07em", textTransform: "uppercase" }}>Importer un PDF</h3>

            {/* zone de dépôt */}
            <label style={{
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              border: `2px dashed ${pdfData ? C.green : C.border}`, borderRadius: 10, padding: "20px 16px",
              cursor: "pointer", color: pdfData ? C.green : C.muted, fontSize: 13, gap: 6, background: "#f5f4f0",
            }}>
              <span style={{ fontSize: 28 }}>{pdfData ? "✅" : "📄"}</span>
              {pdfData ? pdfData.nom : "Cliquer pour choisir un PDF"}
              <input type="file" accept="application/pdf" onChange={handleFile} style={{ display: "none" }} />
            </label>

            <Input label="Nom du document" value={draft.nom} onChange={v => setDraft(d => ({ ...d, nom: v }))} placeholder="Ex : Plan RDC R01" />
            <Select label="Chantier" value={draft.chantier} onChange={v => setDraft(d => ({ ...d, chantier: v }))}
              options={["", ...chantiers.map(c => c.nom)]} />
            <Select label="Type" value={draft.type} onChange={v => setDraft(d => ({ ...d, type: v }))} options={DOC_TYPES} />
            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={saveDoc}>Enregistrer</Btn>
              <Btn variant="ghost" onClick={() => { setAdding(false); setPdfData(null); }}>Annuler</Btn>
            </div>
            <div style={{ color: C.muted, fontSize: 11, lineHeight: 1.5 }}>
              ⚠️ Les PDFs sont visibles pendant la session. Ré-importez-les à chaque ouverture du fichier.
            </div>
          </div>
        )}

        {/* liste des docs */}
        <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
          {filtered.length === 0 && (
            <div style={{ color: C.muted, textAlign: "center", marginTop: 40, fontSize: 14 }}>
              Aucun document{filterChantier !== "Tous" ? ` pour ${filterChantier}` : ""}<br />
              <span style={{ fontSize: 12 }}>Clique sur « + Importer » pour ajouter un PDF</span>
            </div>
          )}
          {filtered.map(doc => (
            <div key={doc.id} onClick={() => openDoc(doc)}
              style={{
                background: "#fff",
                border: `1.5px solid ${viewing && viewing.id === doc.id ? "#1a1a1a" : C.border}`,
                borderRadius: 12, padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 12,
                boxShadow: viewing && viewing.id === doc.id ? "0 2px 8px rgba(0,0,0,.08)" : "0 1px 3px rgba(0,0,0,.04)",
              }}>
              <div style={{ fontSize: 26, flexShrink: 0 }}>📄</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: "#1a1a1a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{doc.nom}</div>
                <div style={{ color: C.muted, fontSize: 11, marginTop: 2 }}>{doc.chantier} · {doc.date}</div>
                <span style={{
                  background: "#f0ede7", color: "#555", borderRadius: 4,
                  padding: "1px 7px", fontSize: 10, fontWeight: 600, marginTop: 4, display: "inline-block", letterSpacing: ".03em"
                }}>{doc.type}</span>
              </div>
              <button onClick={e => { e.stopPropagation(); delDoc(doc.id); }}
                style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 18, flexShrink: 0 }}>×</button>
            </div>
          ))}
        </div>
      </div>

      {/* panneau droit : visionneuse */}
      {viewing && (
        <div style={{ background: "#fff", borderRadius: 14, border: `1px solid ${C.border}`, display: "flex", flexDirection: "column", minHeight: 0, boxShadow: "0 2px 12px rgba(0,0,0,.07)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 18px", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div>
              <span style={{ fontWeight: 600, fontSize: 14, color: "#1a1a1a" }}>{viewing.nom}</span>
              <span style={{ color: C.muted, fontSize: 12, marginLeft: 10 }}>{viewing.chantier}</span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <a href={viewing.dataUrl} download={viewing.nom + ".pdf"}
                style={{ background: "#f5f4f0", color: "#1a1a1a", border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 14px", fontWeight: 600, fontSize: 12, cursor: "pointer", textDecoration: "none" }}>
                ⬇️ Télécharger
              </a>
              <button onClick={() => setViewing(null)}
                style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 20, lineHeight: 1 }}>×</button>
            </div>
          </div>
          <iframe src={viewing.dataUrl} style={{ flex: 1, border: "none", borderRadius: "0 0 14px 14px", minHeight: 0 }} title={viewing.nom} />
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState("chantiers");
  const [user, setUser] = useState(undefined); // undefined = loading, null = non connecté
  const mob = useIsMobile();

  const supaChantiers = useSupaChantiers(user?.id);
  const supaSettings  = useSupaSettings(user?.id);

  // Vérifier la session au démarrage
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user || null);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user || null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const logout = async () => {
    await supabase.auth.signOut();
    setUser(null);
  };

  // Écran de chargement initial
  if (user === undefined) return (
    <div style={{ minHeight:"100vh", background:"#f5f4f0", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ textAlign:"center", color:"#8c8880" }}>
        <div style={{ background:"#1a1a1a", color:"#fff", borderRadius:10, width:48, height:48, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Playfair Display',serif", fontWeight:700, fontSize:22, margin:"0 auto 16px" }}>K</div>
        Chargement...
      </div>
    </div>
  );

  // Écran connexion
  if (!user) return <AuthScreen onAuth={setUser} />;

  const userLabel = user.user_metadata?.full_name || user.email?.split("@")[0] || "Utilisateur";

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Outfit', sans-serif", display: "flex", flexDirection: "column" }}>

      {/* ── header ── */}
      <div style={{ background: "#fff", borderBottom: `1px solid ${C.border}`, padding: mob ? "0 14px" : "0 24px", display: "flex", alignItems: "stretch", justifyContent: "space-between", boxShadow: "0 1px 3px rgba(0,0,0,.06)", flexShrink: 0 }}>
        {/* logo */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0" }}>
          <div style={{ background: "#1a1a1a", color: "#fff", borderRadius: 8, width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: 16, flexShrink: 0 }}>K</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: mob ? 13 : 15, color: "#1a1a1a", fontFamily: "'Playfair Display', serif" }}>CdT Assistant</div>
            {!mob && <div style={{ color: C.muted, fontSize: 11 }}>{userLabel} · Conducteur de travaux</div>}
          </div>
        </div>
        {/* tabs desktop */}
        {!mob && (
          <div style={{ display: "flex", alignItems: "stretch" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                background: "none", border: "none",
                borderBottom: tab === t.id ? "2px solid #1a1a1a" : "2px solid transparent",
                color: tab === t.id ? "#1a1a1a" : C.muted,
                padding: "0 18px", fontWeight: tab === t.id ? 600 : 400, fontSize: 13,
                cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit",
              }}>
                <span style={{ fontSize: 14 }}>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>
        )}
        {/* bouton déconnexion */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {!mob && <span style={{ color: C.muted, fontSize: 12 }}>{new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" })}</span>}
          <button onClick={logout} title="Se déconnecter" style={{
            background: "none", border: `1px solid ${C.border}`, borderRadius: 8,
            padding: "5px 10px", fontSize: 12, color: C.muted, cursor: "pointer", fontFamily: "inherit",
          }}>
            {mob ? "⎋" : "Déconnexion"}
          </button>
        </div>
      </div>

      {/* ── contenu ── */}
      <div style={{ flex: 1, padding: mob ? "12px" : "20px 28px", overflow: "auto", maxWidth: 1400, width: "100%", margin: "0 auto", boxSizing: "border-box", paddingBottom: mob ? 72 : undefined }}>
        {tab === "chantiers" && <TabChantiers userId={user.id} supaChantiers={supaChantiers} supaSettings={supaSettings} />}
        {tab === "cr"        && <TabCR />}
        {tab === "calculs"   && <TabCalculs />}
        {tab === "documents" && <TabDocuments />}
      </div>

      {/* ── barre de navigation mobile ── */}
      {mob && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#fff", borderTop: `1px solid ${C.border}`, display: "flex", zIndex: 100, boxShadow: "0 -2px 10px rgba(0,0,0,.08)" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, background: "none", border: "none", padding: "10px 4px 8px",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              cursor: "pointer", fontFamily: "inherit",
              borderTop: tab === t.id ? "2px solid #1a1a1a" : "2px solid transparent",
            }}>
              <span style={{ fontSize: 20 }}>{t.icon}</span>
              <span style={{ fontSize: 10, fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? "#1a1a1a" : C.muted }}>{t.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
