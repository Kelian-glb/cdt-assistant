          options: { data: { full_name: nom } }

  const [mob, setMob] = useState(window.innerWidth <= 700);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth <= 700);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mob;
}

// ── localStorage hook ──────────────────────────────────────────────────────
function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }, [key, value]);
  return [value, setValue];
}

// ── Supabase data hooks ─────────────────────────────────────────────────────
function useSupaChantiers(userId) {
  const [chantiers, setChantiers] = useState(null);

  const load = useCallback(async () => {
    if (!userId) return;
    const { data } = await supabase.from("chantiers").select("*").eq("user_id", userId).order("created_at", { ascending: false });
    setChantiers(data || []);
  }, [userId]);

  useEffect(() => { load(); }, [load]);

  const saveNew = async (c) => {
    const { nom, client, commune, statut, phase, notes, checks, rappels } = c;
    const { data } = await supabase.from("chantiers").insert({ nom, client, commune, statut, phase, notes, checks, rappels, user_id: userId }).select().single();
    setChantiers(prev => [data, ...(prev||[])]);
    return data;
  };

  const update = async (updated) => {
    const { nom, client, commune, statut, phase, notes, checks, rappels } = updated;
    await supabase.from("chantiers").update({ nom, client, commune, statut, phase, notes, checks, rappels, updated_at: new Date().toISOString() }).eq("id", updated.id);
    setChantiers(prev => (prev||[]).map(c => c.id === updated.id ? updated : c));
  };

  const del = async (id) => {
    await supabase.from("chantiers").delete().eq("id", id);
    setChantiers(prev => (prev||[]).filter(c => c.id !== id));
  };

  return { chantiers, setChantiers, load, saveNew, update, del };
}

function useSupaSettings(userId) {
  const [settings, setSettings] = useState({ phases: null, modeles_checklist: {} });

  useEffect(() => {
    if (!userId) return;
    (async () => {
      const { data } = await supabase.from("user_settings").select("*").eq("user_id", userId).maybeSingle();
      setSettings(data || { phases: null, modeles_checklist: {} });
    })();
  }, [userId]);

  const saveSettings = async (newSettings) => {
    setSettings(s => ({ ...s, ...newSettings }));
    const { data: existing } = await supabase.from("user_settings").select("id").eq("user_id", userId).maybeSingle();
    const payload = { ...newSettings, user_id: userId, updated_at: new Date().toISOString() };
    if (existing) {
      await supabase.from("user_settings").update(payload).eq("user_id", userId);
    } else {
      await supabase.from("user_settings").insert(payload);
    }
  };

  return { settings, saveSettings };
}

// ── Hook Entreprise ─────────────────────────────────────────────────────────
function useSupaEntreprise(userId) {
  const [entreprise, setEntreprise] = useState(null);

  useEffect(() => {
    if (!userId) return;
    supabase.from("entreprise").select("*").eq("user_id", userId).maybeSingle()
      .then(({ data }) => setEntreprise(data || {}));
  }, [userId]);

  const save = async (data) => {
    setEntreprise(data);
    const { data: existing } = await supabase.from("entreprise").select("id").eq("user_id", userId).maybeSingle();
    const payload = { ...data, user_id: userId, updated_at: new Date().toISOString() };
    if (existing) {
      await supabase.from("entreprise").update(payload).eq("user_id", userId);
    } else {
      await supabase.from("entreprise").insert(payload);
    }
  };

  return { entreprise, save };
}


function useSupaCR(userId) {
  const [crs, setCrs] = useState(null);

  useEffect(() => {
    if (!userId) return;
    supabase.from("cr_reunions").select("*").eq("user_id", userId).order("created_at", { ascending: false })
      .then(({ data }) => setCrs(data || []));
  }, [userId]);

  const saveCR = async (cr) => {
    const payload = { ...cr, user_id: userId };
    delete payload.id;
    const { data } = await supabase.from("cr_reunions").insert(payload).select().single();
    setCrs(prev => [data, ...(prev||[])]);
    return data;
  };

  const delCR = async (id) => {
    await supabase.from("cr_reunions").delete().eq("id", id);
    setCrs(prev => (prev||[]).filter(c => c.id !== id));
  };

  return { crs, saveCR, delCR };
}

// ── Hook Métrés ────────────────────────────────────────────────────────────
function useSupaMetres(userId) {
  const [items, setItems] = useState(null);

  useEffect(() => {
    if (!userId) return;
    supabase.from("metres").select("*").eq("user_id", userId).maybeSingle()
      .then(({ data }) => setItems(data?.items || [{ id: 1, desc: "", qte: "", unite: "m²", pu: "" }]));
  }, [userId]);

  const save = async (newItems) => {
    setItems(newItems);
    const { data: existing } = await supabase.from("metres").select("id").eq("user_id", userId).maybeSingle();
    const payload = { items: newItems, user_id: userId, updated_at: new Date().toISOString() };
    if (existing) {
      await supabase.from("metres").update(payload).eq("user_id", userId);
    } else {
      await supabase.from("metres").insert(payload);
    }
  };

  return { items: items || [], save };
}

const PDF_STYLES = `
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;color:#1c1c1e;background:#fff;padding:32px;font-size:13px}
  h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
  h2{font-size:11px;font-weight:700;color:#6d6d72;letter-spacing:.05em;text-transform:uppercase;margin:20px 0 8px;border-bottom:1px solid #f2f2f7;padding-bottom:4px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0071e3;padding-bottom:16px;margin-bottom:20px}
  .logo{background:#0071e3;color:#fff;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .meta-item{background:#f2f2f7;border-radius:8px;padding:10px 12px}
  .meta-label{font-size:10px;color:#6d6d72;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .meta-value{font-size:14px;font-weight:600}
  .progress-bar{background:#e5e5ea;border-radius:99px;height:6px;margin:8px 0;overflow:hidden}
  .progress-fill{height:100%;border-radius:99px;background:#0071e3}
  .check-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f2f2f7;font-size:13px}
  .check-box{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
  .done{background:#30d158;color:#fff}.todo{border:1.5px solid #aeaeb2}
  .rappel{padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:12px}
  .rappel-pending{background:#fff5f5;border-left:3px solid #ff3b30}
  .rappel-done{background:#f0fdf4;border-left:3px solid #30d158;text-decoration:line-through;color:#6d6d72}
  .footer{margin-top:32px;padding-top:12px;border-top:1px solid #e5e5ea;font-size:11px;color:#6d6d72;display:flex;justify-content:space-between}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:6px 8px;background:#f2f2f7;font-weight:600;font-size:11px;text-transform:uppercase;color:#6d6d72}
  td{padding:8px;border-bottom:1px solid #f2f2f7}
  .sig-box{border:1.5px solid #e5e5ea;border-radius:8px;height:80px;margin-top:6px;display:flex;align-items:flex-end;padding:8px;font-size:11px;color:#aeaeb2}
  @media print{body{padding:20px}}
`;

function openPDF(body, title) {
  const w = window.open("", "_blank");
  w.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><title>${title}</title><style>${PDF_STYLES}</style></head><body>${body}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 600);
}

function exportChantiertPDF(chantier, phases, modeles, entreprise) {
  const pct = phases.find(p => p.label === chantier.phase)?.pct || 0;
  const base = modeles[chantier.phase] || CHECKLIST_BASE[chantier.phase] || [];
  const custom = chantier.checks?.[chantier.phase]?._custom || [];
  const allItems = [...base, ...custom];
  const done = allItems.filter(i => chantier.checks?.[chantier.phase]?.[i]).length;
  const rappelsPending = (chantier.rappels||[]).filter(r => !r.regle);
  const rappelsDone    = (chantier.rappels||[]).filter(r => r.regle);
  const nom = chantier.client || chantier.nom;

  openPDF(`
${buildEnteteHTML(entreprise)}
<h1>${nom}</h1>
<div style="color:#6d6d72;font-size:13px;margin-top:4px;margin-bottom:16px">📍 ${chantier.commune||""} &nbsp;·&nbsp; <span style="background:${(STATUS_COLORS[chantier.statut]||"#6d6d72")}18;color:${STATUS_COLORS[chantier.statut]||"#6d6d72"};padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600">● ${chantier.statut}</span></div>
<h2>Avancement — ${pct}%</h2>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="meta" style="margin-top:12px">
  <div class="meta-item"><div class="meta-label">Phase</div><div class="meta-value">${chantier.phase}</div></div>
  <div class="meta-item"><div class="meta-label">Avancement</div><div class="meta-value">${pct}%</div></div>
</div>
${chantier.notes?`<h2>Notes</h2><div style="background:#f2f2f7;border-radius:8px;padding:12px;line-height:1.6">${chantier.notes}</div>`:""}

${allItems.map(item=>{const c=!!chantier.checks?.[chantier.phase]?.[item];return`<div class="check-item"><div class="check-box ${c?"done":"todo"}">${c?"✓":""}</div><span style="color:${c?"#6d6d72":"#1c1c1e"};text-decoration:${c?"line-through":"none"}">${item}</span></div>`;}).join("")}

// ── Panneau complet : gestion des étapes + checklists ────────────────────
function ModelesPanel({ phases, modeles, onSavePhases, onSaveModele, onClose }) {
  const [localPhases, setLocalPhases] = useState(phases.map(p => ({ ...p })));
  const [localModeles, setLocalModeles] = useState({ ...modeles });
  const [editPhaseIdx, setEditPhaseIdx] = useState(null); // index de la phase dont on édite la checklist
  const [renamingIdx, setRenamingIdx] = useState(null);
  const [renameVal, setRenameVal] = useState("");
  const [newPhaseLabel, setNewPhaseLabel] = useState("");
  const [newPhasePct, setNewPhasePct] = useState("");
  const [newCheckItem, setNewCheckItem] = useState("");

  // ── gestion des étapes ──
  const movePhase = (i, dir) => {
    const arr = [...localPhases];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setLocalPhases(arr);
  };

  const deletePhase = (i) => {
    if (localPhases.length <= 1) return;
    if (editPhaseIdx === i) setEditPhaseIdx(null);
    setLocalPhases(arr => arr.filter((_, idx) => idx !== i));
  };

  const startRename = (i) => { setRenamingIdx(i); setRenameVal(localPhases[i].label); };
  const saveRename = () => {
    if (!renameVal.trim()) return;
    const oldLabel = localPhases[renamingIdx].label;
    const newLabel = renameVal.trim();
    // migrer checklist si le label change
    if (oldLabel !== newLabel && localModeles[oldLabel]) {
      const m = { ...localModeles };
      m[newLabel] = m[oldLabel];
      delete m[oldLabel];
      setLocalModeles(m);
    }
    setLocalPhases(arr => arr.map((p, i) => i === renamingIdx ? { ...p, label: newLabel } : p));
    setRenamingIdx(null);
  };

  const addPhase = () => {
    const label = newPhaseLabel.trim();
    const pct = Math.min(100, Math.max(0, parseInt(newPhasePct) || 0));
    if (!label) return;
    if (localPhases.find(p => p.label === label)) return;
    setLocalPhases(arr => [...arr, { label, pct }]);
    setNewPhaseLabel(""); setNewPhasePct("");
  };

  const updatePct = (i, val) => {
    const pct = Math.min(100, Math.max(0, parseInt(val) || 0));
    setLocalPhases(arr => arr.map((p, idx) => idx === i ? { ...p, pct } : p));
  };

  // ── gestion checklist de la phase sélectionnée ──
  const editPhase = editPhaseIdx !== null ? localPhases[editPhaseIdx] : null;
  const checkItems = editPhase ? (localModeles[editPhase.label] || CHECKLIST_BASE[editPhase.label] || []) : [];

  const addCheckItem = () => {
    if (!newCheckItem.trim() || !editPhase) return;
    setLocalModeles(m => ({ ...m, [editPhase.label]: [...checkItems, newCheckItem.trim()] }));
    setNewCheckItem("");
  };

  const removeCheckItem = (item) => {
    setLocalModeles(m => ({ ...m, [editPhase.label]: checkItems.filter(i => i !== item) }));
  };

  const moveCheckItem = (i, dir) => {
    const arr = [...checkItems];
    const j = i + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    setLocalModeles(m => ({ ...m, [editPhase.label]: arr }));
  };

  const [editCheckIdx, setEditCheckIdx] = useState(null);
  const [editCheckVal, setEditCheckVal] = useState("");
  const startEditCheck = (i) => { setEditCheckIdx(i); setEditCheckVal(checkItems[i]); };
  const saveEditCheck = () => {
    if (!editCheckVal.trim() || !editPhase) return;
    const arr = checkItems.map((x, i) => i === editCheckIdx ? editCheckVal.trim() : x);
    setLocalModeles(m => ({ ...m, [editPhase.label]: arr }));
    setEditCheckIdx(null);
  };

  const resetChecklist = () => {
    if (!editPhase) return;
    setLocalModeles(m => { const n = { ...m }; delete n[editPhase.label]; return n; });
  };

  // ── sauvegarder tout ──
  const saveAll = () => {
    onSavePhases(localPhases);
    Object.entries(localModeles).forEach(([phase, items]) => onSaveModele(phase, items));
    onClose();
  };

  const btnStyle = (active) => ({
    background: active ? "#1a1a1a" : "#fff", color: active ? "#fff" : C.muted,
    border: `1.5px solid ${active ? "#1a1a1a" : C.border}`, borderRadius:8,
    padding:"6px 14px", fontSize:12, fontWeight: active ? 600 : 400,
    cursor:"pointer", fontFamily:"inherit",
  });

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.4)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}
      onClick={onClose}>
      <div style={{ background:"#fff", borderRadius:16, width:720, maxHeight:"88vh", display:"flex", flexDirection:"column", boxShadow:"0 12px 50px rgba(0,0,0,.22)", overflow:"hidden" }}
        onClick={e => e.stopPropagation()}>

        {/* header */}
        <div style={{ padding:"18px 22px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
          <div>
            <div style={{ fontWeight:700, fontSize:16, color:"#1a1a1a", fontFamily:"'Playfair Display',serif" }}>Gestion des étapes & checklists</div>
            <div style={{ color:C.muted, fontSize:12, marginTop:2 }}>Modifiez l'ordre, les noms, les % et les checklists de chaque étape</div>
          </div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:24, lineHeight:1 }}>×</button>
        </div>

        {/* corps : 2 colonnes */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", flex:1, overflow:"hidden" }}>

          {/* colonne gauche : liste des étapes */}
          <div style={{ borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:`1px solid ${C.border}`, fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase", flexShrink:0 }}>
              Étapes ({localPhases.length})
            </div>
            <div style={{ overflowY:"auto", flex:1, padding:"10px 12px", display:"flex", flexDirection:"column", gap:5 }}>
              {localPhases.map((p, i) => (
                <div key={i} style={{ background: editPhaseIdx===i?"#f5f4f0":"#fafaf8", border:`1.5px solid ${editPhaseIdx===i?"#1a1a1a":C.border}`, borderRadius:10, padding:"8px 10px" }}>
                  {renamingIdx === i ? (
                    <div style={{ display:"flex", gap:5, marginBottom:6 }}>
                      <input value={renameVal} onChange={e => setRenameVal(e.target.value)}
                        onKeyDown={e => e.key==="Enter" && saveRename()} autoFocus
                        style={{ flex:1, background:"#fff", border:`1.5px solid #1a1a1a`, borderRadius:6, color:"#1a1a1a", padding:"4px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
                      <button onClick={saveRename} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:6, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>OK</button>
                      <button onClick={() => setRenamingIdx(null)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"4px 8px", fontSize:11, color:C.muted, cursor:"pointer" }}>✕</button>
                    </div>
                  ) : (
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                      {/* flèches */}
                      <div style={{ display:"flex", flexDirection:"column", gap:1, flexShrink:0 }}>
                        <button onClick={() => movePhase(i,-1)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:9, padding:"1px 3px", lineHeight:1 }}>▲</button>
                        <button onClick={() => movePhase(i,+1)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:9, padding:"1px 3px", lineHeight:1 }}>▼</button>
                      </div>
                      <span style={{ flex:1, fontWeight:600, fontSize:13, color:"#1a1a1a", cursor:"pointer" }} onClick={() => setEditPhaseIdx(i)}>{p.label}</span>
                      <button onClick={() => startRename(i)} title="Renommer" style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:5, padding:"2px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✏️</button>
                      <button onClick={() => deletePhase(i)} title="Supprimer" style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:15, lineHeight:1 }}>×</button>
                    </div>
                  )}
                  {/* % et nb points */}
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <label style={{ fontSize:10, color:C.muted, flexShrink:0 }}>%</label>
                    <input type="number" value={p.pct} min={0} max={100}
                      onChange={e => updatePct(i, e.target.value)}
                      style={{ width:52, background:"#fff", border:`1px solid ${C.border}`, borderRadius:6, color:"#1a1a1a", padding:"3px 6px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
                    <span style={{ fontSize:10, color:C.muted, flex:1 }}>
                      {(localModeles[p.label] || CHECKLIST_BASE[p.label] || []).length} point{(localModeles[p.label] || CHECKLIST_BASE[p.label] || []).length>1?"s":""}
                    </span>
                    <button onClick={() => { setEditPhaseIdx(i); setEditCheckIdx(null); }}
                      style={{ background: editPhaseIdx===i?"#1a1a1a":"#f5f4f0", color: editPhaseIdx===i?"#fff":C.muted, border:"none", borderRadius:6, padding:"3px 10px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                      {editPhaseIdx===i?"✓ Sélectionnée":"Checklist"}
                    </button>
                  </div>
                </div>
              ))}
            </div>

            {/* ajouter étape */}
            <div style={{ padding:"10px 12px", borderTop:`1px solid ${C.border}`, flexShrink:0, display:"flex", flexDirection:"column", gap:6 }}>
              <div style={{ fontSize:10, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase" }}>Nouvelle étape</div>
              <div style={{ display:"flex", gap:5 }}>
                <input value={newPhaseLabel} onChange={e => setNewPhaseLabel(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && addPhase()} placeholder="Nom (ex: Piscine)"
                  style={{ flex:1, background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"6px 10px", fontSize:12, fontFamily:"inherit", outline:"none" }}
                  onFocus={e => e.target.style.borderColor="#1a1a1a"} onBlur={e => e.target.style.borderColor=C.border} />
                <input type="number" value={newPhasePct} onChange={e => setNewPhasePct(e.target.value)} placeholder="%" min={0} max={100}
                  style={{ width:52, background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"6px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }}
                  onFocus={e => e.target.style.borderColor="#1a1a1a"} onBlur={e => e.target.style.borderColor=C.border} />
                <button onClick={addPhase} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+</button>
              </div>
            </div>
          </div>

          {/* colonne droite : checklist de la phase sélectionnée */}
          <div style={{ display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:`1px solid ${C.border}`, fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase", flexShrink:0 }}>
              {editPhase ? `Checklist — ${editPhase.label}` : "← Sélectionnez une étape"}
            </div>

            {editPhase ? (
              <>
                <div style={{ overflowY:"auto", flex:1, padding:"10px 12px", display:"flex", flexDirection:"column", gap:5 }}>
                  {checkItems.length === 0 && <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"20px 0" }}>Aucun point</div>}
                  {checkItems.map((item, i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 10px", background:"#fafaf8", borderRadius:8, border:`1px solid ${C.border}` }}>
                      <div style={{ display:"flex", flexDirection:"column", gap:1, flexShrink:0 }}>
                        <button onClick={() => moveCheckItem(i,-1)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:9, padding:"1px 3px", lineHeight:1 }}>▲</button>
                        <button onClick={() => moveCheckItem(i,+1)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:9, padding:"1px 3px", lineHeight:1 }}>▼</button>
                      </div>
                      {editCheckIdx === i ? (
                        <>
                          <input value={editCheckVal} onChange={e => setEditCheckVal(e.target.value)}
                            onKeyDown={e => e.key==="Enter" && saveEditCheck()} autoFocus
                            style={{ flex:1, background:"#fff", border:`1.5px solid #1a1a1a`, borderRadius:6, color:"#1a1a1a", padding:"4px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
                          <button onClick={saveEditCheck} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:6, padding:"4px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>OK</button>
                          <button onClick={() => setEditCheckIdx(null)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"4px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✕</button>
                        </>
                      ) : (
                        <>
                          <span style={{ flex:1, fontSize:12, color:"#1a1a1a" }}>{item}</span>
                          <button onClick={() => startEditCheck(i)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:5, padding:"2px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✏️</button>
                          <button onClick={() => removeCheckItem(item)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:15, lineHeight:1 }}>×</button>
                        </>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ padding:"10px 12px", borderTop:`1px solid ${C.border}`, flexShrink:0, display:"flex", flexDirection:"column", gap:6 }}>
                  <div style={{ display:"flex", gap:5 }}>
                    <input value={newCheckItem} onChange={e => setNewCheckItem(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && addCheckItem()} placeholder="Nouveau point..."
                      style={{ flex:1, background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"6px 10px", fontSize:12, fontFamily:"inherit", outline:"none" }}
                      onFocus={e => e.target.style.borderColor="#1a1a1a"} onBlur={e => e.target.style.borderColor=C.border} />
                    <button onClick={addCheckItem} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"6px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+</button>
                  </div>
                  <button onClick={resetChecklist} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:8, padding:"5px 12px", fontSize:11, color:C.muted, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start" }}>
                    ↺ Réinitialiser par défaut
                  </button>
                </div>
              </>
            ) : (
              <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:C.muted, fontSize:13 }}>
                Sélectionnez une étape à gauche<br />pour gérer sa checklist
              </div>
            )}
          </div>
        </div>

        {/* footer */}
        <div style={{ padding:"14px 22px", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0, background:"#fafaf8" }}>
          <button onClick={() => { onSavePhases(PHASES_DEFAULT); onClose(); }}
            style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:8, padding:"7px 14px", fontSize:12, color:C.muted, cursor:"pointer", fontFamily:"inherit" }}>
            ↺ Réinitialiser tout par défaut
          </button>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose} style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, padding:"8px 18px", fontSize:13, color:C.muted, cursor:"pointer", fontFamily:"inherit" }}>Annuler</button>
            <button onClick={saveAll} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"8px 22px", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit", boxShadow:"0 1px 4px rgba(0,0,0,.15)" }}>
              Enregistrer tout
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ChecklistPanel (chantier spécifique) ──────────────────────────────────
function ChecklistPanel({ chantier, onUpdate, modeles }) {
  const phase = chantier.phase;
  // items de base = modèle personnalisé si dispo, sinon base par défaut
  const baseItems = modeles[phase] || CHECKLIST_BASE[phase] || [];
  const checks = chantier.checks || {};
  const phaseChecks = checks[phase] || {};
  const customItems = phaseChecks._custom || [];
  const allItems = [...baseItems, ...customItems];
  const [newItem, setNewItem] = useState("");
  const [editItem, setEditItem] = useState(null); // index en cours d'édition
  const [editVal, setEditVal] = useState("");

  const toggle = (item) => {
    const updated = { ...checks, [phase]: { ...phaseChecks, [item]: !phaseChecks[item] } };
    onUpdate({ ...chantier, checks: updated });
  };

  const addCustom = () => {
    if (!newItem.trim()) return;
    const custom = [...customItems, newItem.trim()];
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
    setNewItem("");
  };

  const removeCustom = (item) => {
    const custom = customItems.filter(i => i !== item);
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
  };

  const startEditCustom = (item, idx) => { setEditItem(idx); setEditVal(item); };
  const saveEditCustom = (oldItem) => {
    if (!editVal.trim()) return;
    const custom = customItems.map(i => i === oldItem ? editVal.trim() : i);
    const updated = { ...checks, [phase]: { ...phaseChecks, _custom: custom } };
    onUpdate({ ...chantier, checks: updated });
    setEditItem(null);
  };

  const done = allItems.filter(i => phaseChecks[i]).length;
  const total = allItems.length;
  const allDone = done === total && total > 0;
  const hasAlert = done < total;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".07em", textTransform:"uppercase" }}>Checklist — {phase}</span>
          {hasAlert && <span style={{ background:"#fef3c7", color:"#92400e", border:"1px solid #fde68a", borderRadius:99, padding:"2px 8px", fontSize:10, fontWeight:700 }}>⚠️ {total-done} en attente</span>}
          {allDone && <span style={{ background:"#d1fae5", color:"#065f46", border:"1px solid #6ee7b7", borderRadius:99, padding:"2px 8px", fontSize:10, fontWeight:700 }}>✅ Tout validé</span>}
        </div>
        <span style={{ color:C.muted, fontSize:12 }}>{done}/{total}</span>
      </div>

      <div style={{ background:"#eeede9", borderRadius:99, height:4, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${total>0?(done/total*100):0}%`, background: allDone?"#22c55e":"#1a1a1a", borderRadius:99, transition:"width .4s" }} />
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
        {allItems.map((item, i) => {
          const checked = !!phaseChecks[item];
          const isCustom = customItems.includes(item);
          const customIdx = customItems.indexOf(item);
          return (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", background: checked?"#f0fdf4":"#fafaf8", borderRadius:8, border:`1px solid ${checked?"#bbf7d0":C.border}` }}>
              {/* checkbox */}
              <div onClick={() => toggle(item)} style={{ width:18, height:18, borderRadius:5, border:`2px solid ${checked?"#22c55e":C.border}`, background: checked?"#22c55e":"#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer", transition:"all .15s" }}>
                {checked && <span style={{ color:"#fff", fontSize:11, fontWeight:900 }}>✓</span>}
              </div>

              {/* label ou input d'édition */}
              {isCustom && editItem === customIdx ? (
                <>
                  <input value={editVal} onChange={e => setEditVal(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && saveEditCustom(item)}
                    autoFocus
                    style={{ flex:1, background:"#fff", border:`1.5px solid #1a1a1a`, borderRadius:6, color:"#1a1a1a", padding:"3px 8px", fontSize:12, fontFamily:"inherit", outline:"none" }} />
                  <button onClick={() => saveEditCustom(item)} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:6, padding:"3px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>OK</button>
                  <button onClick={() => setEditItem(null)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:6, padding:"3px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✕</button>
                </>
              ) : (
                <>
                  <span onClick={() => toggle(item)} style={{ fontSize:13, color: checked?C.muted:"#1a1a1a", textDecoration: checked?"line-through":"none", flex:1, cursor:"pointer" }}>{item}</span>
                  {isCustom && (
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={() => startEditCustom(item, customIdx)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:5, padding:"2px 6px", fontSize:11, color:C.muted, cursor:"pointer" }}>✏️</button>
                      <button onClick={() => removeCustom(item)} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:15, padding:0 }}>×</button>
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:6 }}>
        <input value={newItem} onChange={e => setNewItem(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addCustom()}
          placeholder="Ajouter un point pour ce chantier..."
          style={{ flex:1, background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"7px 11px", fontSize:12, fontFamily:"inherit", outline:"none" }}
          onFocus={e => e.target.style.borderColor="#1a1a1a"}
          onBlur={e => e.target.style.borderColor=C.border}
        />
        <button onClick={addCustom} style={{ background:"#1a1a1a", color:"#fff", border:"none", borderRadius:8, padding:"7px 14px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>+</button>
      </div>
      <div style={{ color:C.muted, fontSize:11 }}>
        ℹ️ Les points en italique sont spécifiques à ce chantier. Pour modifier les points communs à tous les chantiers, utilise "Modèles de checklist".
      </div>
    </div>
  );
}

// TAB 0 — TABLEAU DE BORD
// ══════════════════════════════════════════════════════════════════════════
function TabDashboard({ userId, supaChantiers, supaSettings, userLabel, onNavigate }) {
  const mob = useIsMobile();
  const { chantiers } = supaChantiers;
  const { settings } = supaSettings;
  const phases  = settings?.phases?.length > 0 ? settings.phases : PHASES_DEFAULT;
  const modeles = settings?.modeles_checklist || {};
  const today = new Date().toISOString().split("T")[0];

  if (!chantiers) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:200, color:C.muted }}>Chargement...</div>
  );

  // ── Stats globales ──
  const enCours   = chantiers.filter(c => c.statut === "En cours").length;
  const enAttente = chantiers.filter(c => c.statut === "En attente").length;
  const termines  = chantiers.filter(c => c.statut === "Terminé").length;
  const bloques   = chantiers.filter(c => c.statut === "Bloqué").length;

  // ── Rappels en retard ──
  const rappelsRetard = chantiers.flatMap(c =>
    (c.rappels||[]).filter(r => !r.regle && r.date && r.date < today).map(r => ({ ...r, chantierNom: c.client||c.nom, chantierId: c.id }))
  ).slice(0, 5);

  // ── Rappels à venir (7 prochains jours) ──
  const in7 = new Date(); in7.setDate(in7.getDate() + 7);
  const in7str = in7.toISOString().split("T")[0];
  const rappelsBientot = chantiers.flatMap(c =>
    (c.rappels||[]).filter(r => !r.regle && r.date && r.date >= today && r.date <= in7str).map(r => ({ ...r, chantierNom: c.client||c.nom }))
  ).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 5);

  // ── Chantiers récents ──
  const recents = [...chantiers].slice(0, 3);

  const cardStyle = {
    background: C.surface, borderRadius: 16, padding: "18px 20px",
    border: `1px solid ${C.border}`,
    boxShadow: "0 1px 3px rgba(0,0,0,.06)",
  };

  const StatCard = ({ value, label, color, icon, onClick }) => (
    <div onClick={onClick} style={{ ...cardStyle, cursor: onClick?"pointer":"default", display:"flex", flexDirection:"column", gap:6, flex:1, minWidth: mob?0:140 }}
      onMouseEnter={e => onClick && (e.currentTarget.style.transform="translateY(-1px)")}
      onMouseLeave={e => (e.currentTarget.style.transform="none")}>
      <span style={{ fontSize: 22 }}>{icon}</span>
      <div style={{ fontSize: 28, fontWeight: 700, color: color||C.text, letterSpacing:"-.02em" }}>{value}</div>
      <div style={{ fontSize: 12, color: C.muted, fontWeight: 500 }}>{label}</div>
    </div>
  );

  const heure = new Date().getHours();
  const salut = heure < 12 ? "Bonjour" : heure < 18 ? "Bon après-midi" : "Bonsoir";

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:24, maxWidth:900 }}>

      {/* Salutation */}
      <div>
        <div style={{ fontSize: mob?22:28, fontWeight:700, color:C.text, letterSpacing:"-.02em" }}>{salut}, {userLabel.split(" ")[0]} 👋</div>
        <div style={{ color:C.muted, fontSize:14, marginTop:4 }}>
          {new Date().toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}
        </div>
      </div>

      {/* Alertes urgentes */}
      {(rappelsRetard.length > 0 || bloques > 0) && (
        <div style={{ background:"#fff5f5", border:"1px solid #fecaca", borderRadius:14, padding:"14px 18px", display:"flex", flexDirection:"column", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>🔴</span>
            <span style={{ fontWeight:600, color:C.red, fontSize:14 }}>Attention requise</span>
          </div>
          {bloques > 0 && <div style={{ color:C.red, fontSize:13 }}>· {bloques} chantier{bloques>1?"s":""} bloqué{bloques>1?"s":""}</div>}
          {rappelsRetard.map(r => (
            <div key={r.id} style={{ color:"#c0392b", fontSize:13 }}>
              · <strong>{r.chantierNom}</strong> — {r.texte}
              <span style={{ color:C.red, marginLeft:6, fontSize:11 }}>({new Date(r.date+"T12:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})})</span>
            </div>
          ))}
        </div>
      )}

      {/* Stats */}
      <div>
        <div style={{ fontSize:13, fontWeight:600, color:C.muted, marginBottom:12, letterSpacing:".01em" }}>VUE D'ENSEMBLE</div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
          <StatCard value={chantiers.length} label="Chantiers total" icon="🏗️" onClick={() => onNavigate("chantiers")} />
          <StatCard value={enCours} label="En cours" icon="⚡️" color="#0071e3" onClick={() => onNavigate("chantiers")} />
          <StatCard value={enAttente} label="En attente" icon="⏳" color="#ff9500" onClick={() => onNavigate("chantiers")} />
          <StatCard value={termines} label="Terminés" icon="✅" color="#30d158" onClick={() => onNavigate("chantiers")} />
        </div>
      </div>

      <div style={{ display:"grid", gridTemplateColumns: mob?"1fr":"1fr 1fr", gap:16 }}>

        {/* Rappels à venir */}
        <div style={cardStyle}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <span style={{ fontWeight:600, fontSize:15, color:C.text }}>🔔 Rappels à venir</span>
            <span style={{ fontSize:11, color:C.muted }}>7 prochains jours</span>
          </div>
          {rappelsBientot.length === 0 ? (
            <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"16px 0" }}>Aucun rappel cette semaine ✓</div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {rappelsBientot.map(r => (
                <div key={r.id} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"8px 10px", background:C.surface2, borderRadius:10 }}>
                  <div style={{ flexShrink:0, marginTop:1 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:C.blue, marginTop:3 }} />
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, color:C.text, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{r.texte}</div>
                    <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{r.chantierNom} · {new Date(r.date+"T12:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"long"})}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Chantiers récents */}
        <div style={cardStyle}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <span style={{ fontWeight:600, fontSize:15, color:C.text }}>🏗️ Chantiers récents</span>
            <button onClick={() => onNavigate("chantiers")} style={{ background:"none", border:"none", color:C.blue, fontSize:12, cursor:"pointer", fontFamily:"inherit", fontWeight:500 }}>Voir tout →</button>
          </div>
          {recents.length === 0 ? (
            <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"16px 0" }}>
              Aucun chantier<br/>
              <button onClick={() => onNavigate("chantiers")} style={{ background:C.blue, color:"#fff", border:"none", borderRadius:8, padding:"8px 16px", marginTop:10, fontSize:13, cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>+ Créer un chantier</button>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {recents.map(c => {
                const pct = phases.find(p=>p.label===c.phase)?.pct||0;
                return (
                  <div key={c.id} onClick={() => onNavigate("chantiers")} style={{ padding:"10px 12px", background:C.surface2, borderRadius:10, cursor:"pointer" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <span style={{ fontWeight:600, fontSize:13, color:C.text }}>{c.client || c.nom}</span>
                      <Badge status={c.statut} />
                    </div>
                    <div style={{ fontSize:11, color:C.muted, marginBottom:6 }}>📍 {c.commune} · {c.phase}</div>
                    <ProgressBar value={pct} />
                    <div style={{ textAlign:"right", fontSize:11, color:C.blue, fontWeight:600, marginTop:3 }}>{pct}%</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// TAB 1 — CHANTIERS
// ══════════════════════════════════════════════════════════════════════════
function TabChantiers({ userId, supaChantiers, supaSettings, exportPDF, supaEntreprise }) {
  const mob = useIsMobile();
  const { chantiers, saveNew, update: updateChantier, del: delChantier } = supaChantiers;
  const { settings, saveSettings } = supaSettings;
  const { entreprise } = supaEntreprise || {};

  const phases  = settings?.phases?.length > 0 ? settings.phases : PHASES_DEFAULT;
  const modeles = settings?.modeles_checklist || {};

  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState(null);
  const [draft, setDraft] = useState({});
  const [detailTab, setDetailTab] = useState("infos");
  const [showModeles, setShowModeles] = useState(false);
  const [saving, setSaving] = useState(false);

  const phaseInfo = (label) => phases.find(p => p.label === label) || { pct: 0 };

  const openNew = () => {
    setDraft({ nom:"", client:"", commune:"", statut:"En attente", phase: phases[0]?.label || "Préparation", notes:"", checks:{}, rappels:[] });
    setForm("new"); setSelected(null);
  };
  const openEdit = (c) => { setDraft({ ...c }); setForm(c.id); setSelected(c.id); };

  const save = async () => {
    if (!draft.nom || saving) return;
    setSaving(true);
    if (form === "new") {
      const newC = await saveNew({ ...draft, rappels: draft.rappels || [] });
      if (newC) setSelected(newC.id);
    } else {
      await updateChantier({ ...draft });
    }
    setSaving(false);
    setForm(null);
  };

  const del = async (id) => {
    await delChantier(id);
    if (selected === id) setSelected(null);
    setForm(null);
  };

  const onPhaseChange = (phase) => {
    const pct = phaseInfo(phase).pct;
    setDraft(d => ({ ...d, phase, avancement: pct }));
  };

  const saveModele = async (phase, items) => {
    await saveSettings({ phases, modeles_checklist: { ...modeles, [phase]: items } });
  };
  const savePhases = async (newPhases) => {
    await saveSettings({ phases: newPhases, modeles_checklist: modeles });
  };

  if (!chantiers) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:200, color:C.muted, fontSize:14 }}>
      Chargement de vos chantiers...
    </div>
  );

  const sel = (chantiers||[]).find(c => c.id === selected);

  const today = new Date().toISOString().split("T")[0];
  const alerts = (chantiers||[]).filter(c => {
    if (c.statut !== "En cours") return false;
    const base = modeles[c.phase] || CHECKLIST_BASE[c.phase] || [];
    const custom = (c.checks?.[c.phase]?._custom) || [];
    const all = [...base, ...custom];
    const done = all.filter(i => c.checks?.[c.phase]?.[i]).length;
    return done < all.length;
  });

  return (
    <>
      {showModeles && <ModelesPanel phases={phases} modeles={modeles} onSavePhases={savePhases} onSaveModele={saveModele} onClose={() => setShowModeles(false)} />}

      <div style={{ display:"grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap:20, height: mob ? "auto" : "100%" }}>

        {/* liste chantiers */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span style={{ color:C.muted, fontSize:12, fontWeight:500, letterSpacing:".04em", textTransform:"uppercase" }}>{(chantiers||[]).length} chantier{(chantiers||[]).length>1?"s":""}</span>
            <div style={{ display:"flex", gap:6 }}>
              <button onClick={() => setShowModeles(true)} style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, padding:"5px 12px", fontSize:11, color:C.muted, cursor:"pointer", fontFamily:"inherit", fontWeight:500 }}>📋 Modèles</button>
              <Btn small onClick={openNew}>+ Nouveau</Btn>
            </div>
          </div>
          <div style={{ overflowY:"auto", display:"flex", flexDirection:"column", gap:8 }}>
            {(chantiers||[]).map(c => {
              const base = modeles[c.phase] || CHECKLIST_BASE[c.phase] || [];
              const custom = (c.checks?.[c.phase]?._custom) || [];
              const all = [...base, ...custom];
              const done = all.filter(i => c.checks?.[c.phase]?.[i]).length;
              const hasAlert = done < all.length && c.statut === "En cours";
            const rappelsEnAttente = (c.rappels||[]).filter(r=>!r.regle).length;
            const rappelsEnRetard = (c.rappels||[]).filter(r=>!r.regle && r.date && r.date < today).length;
              const pct = phaseInfo(c.phase).pct;
              return (
                <div key={c.id} onClick={() => { setSelected(c.id); setForm(null); setDetailTab("infos"); }}
                  style={{ background:"#fff", border:`1.5px solid ${selected===c.id?"#1a1a1a":C.border}`, borderRadius:12, padding:"14px 16px", cursor:"pointer", boxShadow:selected===c.id?"0 2px 12px rgba(0,0,0,.08)":"0 1px 3px rgba(0,0,0,.04)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ fontWeight:600, fontSize:14, color:"#1a1a1a" }}>{c.client || c.nom}</span>
                    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                      {hasAlert && <span style={{ width:8, height:8, borderRadius:99, background:"#f59e0b", display:"inline-block", boxShadow:"0 0 0 2px #fef3c7" }} title="Checklist en attente" />}
                    {rappelsEnRetard > 0 && <span style={{ background:"#ef4444", color:"#fff", borderRadius:99, fontSize:9, fontWeight:700, padding:"0 5px", lineHeight:"15px" }} title="Rappels en retard">🔔{rappelsEnRetard}</span>}
                    {rappelsEnAttente > 0 && rappelsEnRetard === 0 && <span style={{ width:8, height:8, borderRadius:99, background:"#3b82f6", display:"inline-block", boxShadow:"0 0 0 2px #dbeafe" }} title={`${rappelsEnAttente} rappel(s) en attente`} />}
                      <Badge status={c.statut} />
                    </div>
                  </div>
                  <div style={{ color:C.muted, fontSize:12, marginBottom:10 }}>📍 {c.commune}</div>
                  <ProgressBar value={pct} />
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
                    <span style={{ color:C.muted, fontSize:11 }}>{c.phase}</span>
                    <span style={{ color:"#1a1a1a", fontSize:11, fontWeight:700 }}>{pct}%</span>
                  </div>
                  {all.length > 0 && (
                    <div style={{ marginTop:8, display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ flex:1, background:"#eeede9", borderRadius:99, height:3 }}>
                        <div style={{ height:"100%", width:`${all.length>0?(done/all.length*100):0}%`, background: done===all.length?"#22c55e":"#1a1a1a", borderRadius:99 }} />
                      </div>
                      <span style={{ fontSize:10, color:C.muted }}>{done}/{all.length} checklist</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* détail / form */}
        <div style={{ background:"#fff", borderRadius:14, border:`1px solid ${C.border}`, overflowY:"auto", boxShadow:"0 1px 4px rgba(0,0,0,.05)", display:"flex", flexDirection:"column" }}>
          {form !== null ? (
            <div style={{ padding:22, display:"flex", flexDirection:"column", gap:14 }}>
              <h3 style={{ margin:0, color:"#1a1a1a", fontSize:13, fontWeight:700, letterSpacing:".04em", textTransform:"uppercase" }}>{form==="new"?"Nouveau chantier":"Modifier"}</h3>
              <Input label="Client" value={draft.client} onChange={v => setDraft(d=>({...d,client:v, nom:v}))} placeholder="M. / Mme ..." />
              <Input label="Adresse" value={draft.commune} onChange={v => setDraft(d=>({...d,commune:v}))} placeholder="12 rue de la Paix, Nîmes" />
              <Select label="Statut" value={draft.statut} onChange={v => setDraft(d=>({...d,statut:v}))} options={STATUTS} />
              <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                <label style={{ fontSize:11, color:C.muted, fontWeight:600, letterSpacing:".07em", textTransform:"uppercase" }}>Phase — Avancement automatique</label>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:5 }}>
                  {phases.map(p => (
                    <button key={p.label} onClick={() => onPhaseChange(p.label)} style={{
                      background: draft.phase===p.label?"#1a1a1a":"#f5f4f0",
                      color: draft.phase===p.label?"#fff":C.muted,
                      border: `1.5px solid ${draft.phase===p.label?"#1a1a1a":C.border}`,
                      borderRadius:8, padding:"6px 8px", fontSize:11, fontWeight: draft.phase===p.label?600:400,
                      cursor:"pointer", fontFamily:"inherit", textAlign:"left", lineHeight:1.3,
                    }}>
                      <div>{p.label}</div>
                      <div style={{ fontSize:10, opacity:.7 }}>{p.pct}%</div>
                    </button>
                  ))}
                </div>
              </div>
              <Textarea label="Notes" value={draft.notes||""} onChange={v => setDraft(d=>({...d,notes:v}))} rows={3} placeholder="Observations..." />
              <div style={{ display:"flex", gap:8 }}>
                <Btn onClick={save}>Enregistrer</Btn>
                <Btn variant="ghost" onClick={() => setForm(null)}>Annuler</Btn>
                {form!=="new" && <Btn variant="danger" onClick={() => del(form)}>Supprimer</Btn>}
              </div>
            </div>
          ) : sel ? (
            <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>
              <div style={{ padding:"18px 22px 0" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                  <div>
                    <h2 style={{ margin:0, color:"#1a1a1a", fontSize:18, fontWeight:700 }}>{sel.client}</h2>
                    <div style={{ color:C.muted, fontSize:12, marginTop:3 }}>📍 {sel.commune}</div>
                  </div>
                  <Badge status={sel.statut} />
                </div>
                <div style={{ background:"#f5f4f0", borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                    <span style={{ color:C.muted, fontSize:12 }}>Phase : <strong style={{ color:"#1a1a1a" }}>{sel.phase}</strong></span>
                    <span style={{ color:"#1a1a1a", fontWeight:700, fontSize:13 }}>{phaseInfo(sel.phase).pct}%</span>
                  </div>
                  <ProgressBar value={phaseInfo(sel.phase).pct} />
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:8, overflowX:"auto" }}>
                    {phases.map((p, i) => {
                      const current = phases.findIndex(x => x.label === sel.phase);
                      const isPast = i < current, isCurrent = i === current;
                      return (
                        <div key={p.label} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, minWidth:0 }}>
                          <div style={{ width:8, height:8, borderRadius:99, background: isCurrent?"#1a1a1a":isPast?"#22c55e":"#eeede9", border:`2px solid ${isCurrent?"#1a1a1a":isPast?"#22c55e":"#d1d5db"}` }} />
                          <span style={{ fontSize:8, color:isCurrent?"#1a1a1a":isPast?C.green:C.muted, fontWeight:isCurrent?700:400, whiteSpace:"nowrap", overflow:"hidden", maxWidth:40, textOverflow:"ellipsis" }}>{p.label.split(" ")[0]}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{ display:"flex", gap:0, borderBottom:`1px solid ${C.border}` }}>
                  {[["infos","📋 Infos"],["checklist","✅ Checklist"],["rappels","🔔 Rappels"]].map(([id,label]) => {
                    // badge rappels en attente
                    const rappelsEnAttente = id==="rappels" ? (sel.rappels||[]).filter(r=>!r.regle).length : 0;
                    return (
                      <button key={id} onClick={() => setDetailTab(id)} style={{
                        background:"none", border:"none", borderBottom:`2px solid ${detailTab===id?"#1a1a1a":"transparent"}`,
                        color: detailTab===id?"#1a1a1a":C.muted, padding:"8px 14px", fontSize:12, fontWeight:detailTab===id?600:400,
                        cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", gap:5,
                      }}>
                        {label}
                        {rappelsEnAttente > 0 && <span style={{ background:"#ef4444", color:"#fff", borderRadius:99, fontSize:10, fontWeight:700, padding:"0px 5px", lineHeight:"16px" }}>{rappelsEnAttente}</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{ flex:1, padding:"16px 22px 22px", overflowY:"auto" }}>
                {detailTab === "infos" ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                    {sel.notes && (
                      <div style={{ background:"#f5f4f0", borderRadius:10, padding:"12px 14px" }}>
                        <div style={{ color:C.muted, fontSize:10, fontWeight:600, letterSpacing:".07em", textTransform:"uppercase", marginBottom:6 }}>Notes</div>
                        <div style={{ color:"#1a1a1a", fontSize:13, lineHeight:1.6 }}>{sel.notes}</div>
                      </div>
                    )}
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <Btn small onClick={() => openEdit(sel)}>✏️ Modifier</Btn>
                    <Btn small variant="ghost" onClick={() => exportPDF && exportPDF(sel, phases, modeles, entreprise)}>📄 Exporter PDF</Btn>
                  </div>
                  </div>
                ) : detailTab === "checklist" ? (
                  <ChecklistPanel chantier={sel} onUpdate={updateChantier} modeles={modeles} />
                ) : (
                  <RappelsPanel chantier={sel} onUpdate={updateChantier} phases={phases} />
                )}
              </div>
            </div>
          ) : (
            <div style={{ color:C.muted, textAlign:"center", marginTop:60, fontSize:14, padding:22 }}>
              Sélectionne un chantier<br />ou crée-en un nouveau
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ── RappelsPanel ──────────────────────────────────────────────────────────
function RappelsPanel({ chantier, onUpdate, phases }) {
  const today = new Date().toISOString().split("T")[0];
  const rappels = chantier.rappels || [];
  const [form, setForm] = useState(false);
  const [draft, setDraft] = useState({ texte:"", type:"general", phase: chantier.phase, date:"", regle:false });
  const [filterStatut, setFilterStatut] = useState("Tous");

  // Index de la phase actuelle
  const currentPhaseIdx = phases.findIndex(p => p.label === chantier.phase);

  const save = () => {
    if (!draft.texte.trim()) return;
    const r = { ...draft, id: Date.now(), texte: draft.texte.trim() };
    onUpdate({ ...chantier, rappels: [r, ...rappels] });
    setDraft({ texte:"", type:"general", phase: chantier.phase, date:"", regle:false });
    setForm(false);
  };

  const toggle = (id) => {
    onUpdate({ ...chantier, rappels: rappels.map(r => r.id===id ? {...r, regle:!r.regle} : r) });
  };

  const del = (id) => {
    onUpdate({ ...chantier, rappels: rappels.filter(r => r.id!==id) });
  };

  const isOverdue = (r) => !r.regle && r.date && r.date < today;

  // Visibilité : un rappel d'étape n'est visible que si on est à cette étape ou après
  const isVisible = (r) => {
    if (r.type === "general" || !r.type) return true; // rappel général : toujours visible
    const rPhaseIdx = phases.findIndex(p => p.label === r.phase);
    return currentPhaseIdx >= rPhaseIdx; // visible seulement si on a atteint l'étape
  };

  // Rappels à venir (cachés car on n'a pas encore atteint leur étape)
  const rappelsEnAttente = rappels.filter(r => !isVisible(r) && !r.regle);

  const filtered = rappels
    .filter(r => isVisible(r))
    .filter(r => filterStatut==="Tous" || (filterStatut==="En attente" ? !r.regle : r.regle));

  // Grouper : généraux d'abord, puis par phase
  const generaux = filtered.filter(r => r.type === "general" || !r.type);
  const parPhase = {};
  filtered.filter(r => r.type === "phase").forEach(r => {
    if (!parPhase[r.phase]) parPhase[r.phase] = [];
    parPhase[r.phase].push(r);
  });

  const RappelCard = ({ r }) => {
    const overdue = isOverdue(r);
    return (
      <div style={{
        background: r.regle ? "#f0fdf4" : "#fff",
        border: `1.5px solid ${overdue ? "#ef4444" : r.regle ? "#bbf7d0" : C.border}`,
        borderRadius: 10, padding: "10px 14px",
        display: "flex", gap: 10, alignItems: "flex-start",
      }}>
        <button onClick={() => toggle(r.id)} style={{
          width:20, height:20, borderRadius:6, flexShrink:0, marginTop:1,
          border:`2px solid ${r.regle ? "#30d158" : C.border}`,
          background: r.regle ? "#30d158" : "#fff",
          display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer",
        }}>
          {r.regle && <span style={{ color:"#fff", fontSize:11, fontWeight:900, lineHeight:1 }}>✓</span>}
        </button>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, color: r.regle ? C.muted : "#1a1a1a", textDecoration: r.regle ? "line-through" : "none", lineHeight:1.5 }}>{r.texte}</div>
          <div style={{ display:"flex", gap:6, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
            {r.date && (
              <span style={{
                fontSize:11, fontWeight:600, borderRadius:6, padding:"2px 8px",
                background: overdue ? "#fee2e2" : r.regle ? "#d1fae5" : C.surface2,
                color: overdue ? "#b91c1c" : r.regle ? C.greenD : C.muted,
                border:`1px solid ${overdue ? "#fca5a5" : r.regle ? "#6ee7b7" : C.border}`,
              }}>
                {overdue ? "⚠️ " : "📅 "}{new Date(r.date+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})}
              </span>
            )}
            <span style={{ fontSize:11, color: r.regle ? C.greenD : C.muted, fontWeight:600 }}>
              {r.regle ? "✅ Réglé" : "⏳ En attente"}
            </span>
          </div>
        </div>
        <button onClick={() => del(r.id)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:16, opacity:.4 }}
          onMouseEnter={e => e.currentTarget.style.opacity=1} onMouseLeave={e => e.currentTarget.style.opacity=.4}>×</button>
      </div>
    );
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>

      {/* barre d'outils */}
      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
        <select value={filterStatut} onChange={e => setFilterStatut(e.target.value)}
          style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:C.text, padding:"6px 10px", fontSize:12, fontFamily:"inherit", outline:"none", flex:1 }}>
          {["Tous","En attente","Réglé"].map(s => <option key={s}>{s}</option>)}
        </select>
        <button onClick={() => setForm(f=>!f)} style={{ background:C.blue, color:"#fff", border:"none", borderRadius:8, padding:"6px 16px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"inherit" }}>
          {form ? "Annuler" : "+ Rappel"}
        </button>
      </div>

      {/* rappels en attente d'étape */}
      {rappelsEnAttente.length > 0 && (
        <div style={{ background:"#f5f3ff", border:"1px solid #ddd6fe", borderRadius:10, padding:"10px 14px" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#7c3aed", letterSpacing:".04em", textTransform:"uppercase", marginBottom:6 }}>
            🔒 {rappelsEnAttente.length} rappel{rappelsEnAttente.length>1?"s":""} en attente d'étape
          </div>
          {rappelsEnAttente.map(r => (
            <div key={r.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom:`1px solid #ede9fe` }}>
              <span style={{ fontSize:12, color:"#6d28d9" }}>🔒 {r.texte}</span>
              <span style={{ fontSize:11, color:"#8b5cf6", background:"#ede9fe", borderRadius:99, padding:"2px 8px" }}>S'affiche à : {r.phase}</span>
            </div>
          ))}
          <div style={{ fontSize:11, color:"#8b5cf6", marginTop:6 }}>Ces rappels s'afficheront automatiquement quand tu arriveras à l'étape concernée.</div>
        </div>
      )}

      {/* formulaire */}
      {form && (
        <div style={{ background:C.surface2, borderRadius:12, padding:16, display:"flex", flexDirection:"column", gap:12, border:`1.5px solid ${C.blue}` }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.muted, letterSpacing:".04em", textTransform:"uppercase" }}>Nouveau rappel</div>

          {/* toggle type */}
          <div style={{ display:"flex", background:"#fff", borderRadius:10, padding:3, border:`1px solid ${C.border}` }}>
            {[["general","🔔 Général","Toujours visible"],["phase","🔒 Lié à une étape","Visible à partir d'une étape"]].map(([t, label, desc]) => (
              <button key={t} onClick={() => setDraft(d=>({...d, type:t}))} style={{
                flex:1, background: draft.type===t ? C.blue : "transparent",
                color: draft.type===t ? "#fff" : C.muted,
                border:"none", borderRadius:8, padding:"8px 10px", cursor:"pointer",
                fontFamily:"inherit", fontSize:12, fontWeight: draft.type===t ? 600 : 400,
                display:"flex", flexDirection:"column", alignItems:"center", gap:2,
              }}>
                <span>{label}</span>
                <span style={{ fontSize:10, opacity:.7 }}>{desc}</span>
              </button>
            ))}
          </div>

          <textarea value={draft.texte} onChange={e => setDraft(d=>({...d,texte:e.target.value}))}
            placeholder={draft.type==="general" ? "Ex : Vérifier le PLU avant démarrage" : "Ex : Porte de garage à fournir par le client"}
            rows={3}
            style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 11px", fontSize:13, fontFamily:"inherit", outline:"none", resize:"vertical" }}
            onFocus={e => e.target.style.borderColor=C.blue} onBlur={e => e.target.style.borderColor=C.border}
          />

          <div style={{ display:"grid", gridTemplateColumns: draft.type==="phase" ? "1fr 1fr" : "1fr", gap:8 }}>
            {draft.type === "phase" && (
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                <label style={{ fontSize:12, color:C.muted, fontWeight:500 }}>S'affiche à partir de l'étape</label>
                <select value={draft.phase} onChange={e => setDraft(d=>({...d,phase:e.target.value}))}
                  style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 10px", fontSize:13, fontFamily:"inherit", outline:"none" }}>
                  {phases.map(p => <option key={p.label}>{p.label}</option>)}
                </select>
                {draft.phase !== chantier.phase && phases.findIndex(p=>p.label===draft.phase) > currentPhaseIdx && (
                  <div style={{ fontSize:11, color:"#7c3aed", background:"#f5f3ff", borderRadius:6, padding:"4px 8px" }}>
                    🔒 Ce rappel sera caché jusqu'à l'étape « {draft.phase} »
                  </div>
                )}
              </div>
            )}
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <label style={{ fontSize:12, color:C.muted, fontWeight:500 }}>Date limite (optionnel)</label>
              <input type="date" value={draft.date} onChange={e => setDraft(d=>({...d,date:e.target.value}))}
                style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:8, color:"#1a1a1a", padding:"8px 10px", fontSize:13, fontFamily:"inherit", outline:"none" }}
                onFocus={e => e.target.style.borderColor=C.blue} onBlur={e => e.target.style.borderColor=C.border}
              />
            </div>
          </div>

          <button onClick={save} style={{ background:C.blue, color:"#fff", border:"none", borderRadius:8, padding:"9px 20px", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"inherit", alignSelf:"flex-start", boxShadow:`0 1px 4px ${C.blue}40` }}>
            Enregistrer
          </button>
        </div>
      )}

      {/* liste */}
      {generaux.length === 0 && Object.keys(parPhase).length === 0 && (
        <div style={{ color:C.muted, textAlign:"center", padding:"30px 0", fontSize:13 }}>
          Aucun rappel visible<br/>
          <span style={{ fontSize:12 }}>Clique sur « + Rappel » pour en ajouter un</span>
        </div>
      )}

      {/* Rappels généraux */}
      {generaux.length > 0 && (
        <div>
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".06em", textTransform:"uppercase", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
            🔔 Rappels généraux
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {generaux.map(r => <RappelCard key={r.id} r={r} />)}
          </div>
        </div>
      )}

      {/* Rappels par étape */}
      {Object.entries(parPhase).map(([phase, items]) => (
        <div key={phase}>
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:".06em", textTransform:"uppercase", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
            <span>🔒 Étape : {phase}</span>
            {phase === chantier.phase && (
              <span style={{ background:C.blue, color:"#fff", borderRadius:99, padding:"1px 8px", fontSize:10, fontWeight:600 }}>Phase actuelle</span>
            )}
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {items.map(r => <RappelCard key={r.id} r={r} />)}
          </div>
        </div>
      ))}

    </div>
  );
}


function TabCR({ userId, supaCR, supaChantiers, supaEntreprise }) {

    presentsEntreprises:"", presentsClient:"", avancement:"", pointsAvalides:"",
    problemes:"", decisionsRetenues:"", reservesLevees:"", reservesNouvelles:"", prochainRdv:"",
  });

  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [viewingCR, setViewingCR] = useState(null);

  // ── PV state ──

    chantier:"", artisan:"", metier:"", date:today, conducteur:"",
    travaux:"", reserves:"", observations:"", dateLeveReserves:"",

  const [pvOutput, setPvOutput] = useState("");

  // ── Entreprise state ──

  useEffect(() => {

    const d = new Date(cr.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});

────────────────────────────────────────
${cr.avancement}

${cr.problemes}

${cr.prochainRdv}

    await saveCR({ chantier:cr.chantier, date:cr.date, conducteur:cr.conducteurTravaux, maitrise_ouvrage:cr.maitriseOuvrage, presents_entreprises:cr.presentsEntreprises, presents_client:cr.presentsClient, avancement:cr.avancement, points_avalides:cr.pointsAvalides, problemes:cr.problemes, decisions:cr.decisionsRetenues, reserves_levees:cr.reservesLevees, reserves_nouvelles:cr.reservesNouvelles, prochain_rdv:cr.prochainRdv, contenu:output });
    setSaving(false); setSaved(true);

${pv.travaux}

${pv.reserves || "Aucune réserve — travaux acceptés sans réserve"}

  <span>${titre}</span>

            <Btn onClick={generatePV}>📄 Générer le PV</Btn>
          </div>
          <div style={{ background:C.surface, borderRadius:16, border:`1px solid ${C.border}`, display:"flex", flexDirection:"column" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 18px", borderBottom:`1px solid ${C.border}` }}>

                  <Btn small variant="ghost" onClick={() => copy(pvOutput)}>📋 Copier</Btn>

                </div>

            </pre>

        </div>

            <Input label="URL du logo (lien image)" value={ent.logo_url} onChange={v => { setEnt(e=>({...e,logo_url:v})); setEntSaved(false); }} placeholder="" />
            <div style={{ fontSize:11, color:C.muted }}>
              Pour le logo, hébergez votre image sur un service gratuit (ex: <strong>imgur.com</strong>) et collez l'URL directe ici.
            </div>
            <Btn onClick={async () => { setEntSaving(true); await saveEntreprise(ent); setEntSaving(false); setEntSaved(true); }} disabled={entSaving}>
              {entSaved ? "✅ Sauvegardé" : entSaving ? "Sauvegarde..." : "💾 Enregistrer"}
            </Btn>
          </div>

          {/* Aperçu en-tête */}
          <div style={{ background:C.surface, borderRadius:16, padding:22, border:`1px solid ${C.border}` }}>
            <div style={{ fontSize:13, fontWeight:600, color:C.muted, marginBottom:14 }}>Aperçu de l'en-tête PDF</div>
            <div style={{ background:"#fff", border:`1px solid ${C.border}`, borderRadius:12, padding:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"2px solid #0071e3", paddingBottom:12, marginBottom:12 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  {ent.logo_url ? (
                    <img src={ent.logo_url} style={{ height:44, maxWidth:120, objectFit:"contain", borderRadius:6 }} alt="Logo" onError={e => e.target.style.display="none"} />
                  ) : (
                    <div style={{ background:"#0071e3", color:"#fff", borderRadius:8, width:40, height:40, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, fontWeight:700 }}>
                      {(ent.nom||"K")[0]?.toUpperCase()}
                    </div>
                  )}
                  <div>
                    <div style={{ fontSize:15, fontWeight:700, color:"#1c1c1e" }}>{ent.nom || "Nom de l'entreprise"}</div>
                    {ent.adresse && <div style={{ fontSize:11, color:"#6d6d72" }}>{ent.adresse}</div>}
                    <div style={{ fontSize:11, color:"#6d6d72" }}>{[ent.telephone, ent.email].filter(Boolean).join(" · ") || "Téléphone · Email"}</div>
                  </div>
                </div>
                <div style={{ textAlign:"right", fontSize:11, color:"#6d6d72" }}>{new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"})}</div>
              </div>
              <div style={{ fontSize:11, color:C.muted, textAlign:"center" }}>↑ En-tête qui apparaîtra sur tous vos PDFs</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SubToggle({ options, value, onChange }) {
